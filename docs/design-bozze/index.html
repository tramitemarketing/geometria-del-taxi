absolute; top:-6px; left:6px;\n  }\n\n  .estratto-body .eyebrow{\n    display:flex; align-items:center; gap:12px;\n    margin-bottom:22px;\n  }\n  .estratto-body .eyebrow .bar{ width:28px; height:1px; background:var(--terracotta); }\n\n  .estratto-body h2{\n    font-family:var(--display);\n    font-weight:700;\n    font-size: clamp(27px, 3.6vw, 44px);\n    line-height:1.04;\n    letter-spacing:-0.01em;\n    margin:0 0 24px;\n    max-width:16ch;\n    text-wrap:balance;\n  }\n  .estratto-body p{\n    font-size: clamp(15.5px, 1.4vw, 18px);\n    line-height:1.66;\n    color:#3a2f22;\n    max-width:50ch;\n    margin:0 0 28px;\n  }\n  .estratto-body p .lift{ font-style:italic; color:var(--espresso); }\n\n  /* formula: composta su carta, hairline sopra e sotto */\n  .formula{\n    display:flex; align-items:center; gap:18px;\n    padding:20px 0;\n    border-top:1px solid var(--linea);\n    border-bottom:1px solid var(--linea);\n    max-width:50ch;\n  }\n  .formula .eq{\n    font-family:var(--serif);\n    font-size: clamp(20px, 2.3vw, 27px);\n    font-weight:400;\n    letter-spacing:0.01em;\n  }\n  .formula .eq .sub{ font-size:0.66em; vertical-align:-0.18em; color:var(--neutro); }\n  .formula .eq .op{ color:var(--terracotta); padding:0 0.12em; }\n  .formula .glyph{ color:var(--terracotta); flex:0 0 auto; }\n\n  /* ============================================================\n     FOOTER\n     ============================================================ */\n  footer{\n    padding-block: 40px 56px;\n  }\n  .footer-row{\n    display:flex; align-items:center; justify-content:space-between;\n    gap:20px; flex-wrap:wrap;\n    padding-top:24px;\n    border-top:1px solid var(--linea);\n  }\n  .footer-row .sig{\n    font-family:var(--serif); font-style:italic;\n    font-size:16px; color:#3a2f22;\n  }\n  .footer-row .meta{\n    font-family:var(--display); font-weight:600;\n    font-size:11px; letter-spacing:0.2em; text-transform:uppercase;\n    color:var(--neutro);\n    display:flex; align-items:center; gap:12px;\n  }\n\n  /* ============================================================\n     ANIMAZIONE D'INGRESSO — reveal staggered, soffice\n     ============================================================ */\n  .reveal{\n    opacity:0;\n    transform:translateY(16px);\n    transition: opacity .9s cubic-bezier(.2,.6,.15,1),\n                transform .9s cubic-bezier(.2,.6,.15,1);\n    transition-delay: var(--d, 0ms);\n  }\n  .reveal.is-in{ opacity:1; transform:none; }\n\n  /* tracciamento della figura: i path si \"disegnano\" */\n  .draw{\n    stroke-dasharray: var(--len, 600);\n    stroke-dashoffset: var(--len, 600);\n    transition: stroke-dashoffset 1.5s cubic-bezier(.45,.05,.2,1);\n    transition-delay: var(--d, 300ms);\n  }\n  .draw.is-in{ stroke-dashoffset:0; }\n  .pop{\n    opacity:0; transform:scale(.4); transform-origin:center;\n    transition: opacity .5s ease, transform .55s cubic-bezier(.2,1.4,.3,1);\n    transition-delay: var(--d, 800ms);\n  }\n  .pop.is-in{ opacity:1; transform:scale(1); }\n\n  @media (prefers-reduced-motion: reduce){\n    .reveal, .draw, .pop{\n      transition:none !important;\n      opacity:1 !important;\n      transform:none !important;\n      stroke-dashoffset:0 !important;\n    }\n  }\n</style>\n</head>\n<body>\n\n<!-- ============================ TOPBAR ============================ -->\n<div class=\"wrap\">\n  <header class=\"topbar reveal\" style=\"--d:0ms\">\n    <a class=\"brand\" href=\"#\" aria-label=\"Geometria del Taxi\">\n      <!-- rombo L₁ — marchio -->\n      <svg class=\"glyph\" width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\" aria-hidden=\"true\">\n        <path d=\"M10 1.5 L18.5 10 L10 18.5 L1.5 10 Z\" stroke=\"currentColor\" stroke-width=\"1.5\"/>\n        <circle cx=\"10\" cy=\"10\" r=\"1.4\" fill=\"currentColor\"/>\n      </svg>\n      <span>Geometria del Taxi</span>\n    </a>\n    <nav class=\"topnav\" aria-label=\"Sezioni\">\n      <a href=\"#fondamenti\">Teoria</a>\n      <a href=\"#circonferenza\">Coniche</a>\n      <a href=\"#calcolatore\">Calcolatore</a>\n    </nav>\n  </header>\n</div>\n\n<hr class=\"rule reveal\" style=\"--d:60ms\">\n\n<!-- ============================ HERO ============================ -->\n<main>\n<section class=\"wrap hero\" aria-labelledby=\"h1\">\n\n  <div class=\"hero-text\">\n    <div class=\"hero-kicker reveal\" style=\"--d:120ms\">\n      <span class=\"bar\"></span>\n      <span class=\"tag tag-terra\">Geometria del Taxi</span>\n      <span class=\"tag\">· Metrica L₁</span>\n    </div>\n\n    <h1 id=\"h1\" class=\"reveal\" style=\"--d:200ms\">\n      Quando la <em>retta più breve</em> non è la\n      <span class=\"ink\">diagonale<!--\n       --><svg class=\"underink\" viewBox=\"0 0 220 18\" preserveAspectRatio=\"none\" fill=\"none\" aria-hidden=\"true\">\n            <!-- scaletta a gradini: percorso taxicab sotto la parola -->\n            <polyline points=\"2,15 40,15 40,7 95,7 95,14 150,14 150,6 218,6\"\n                      stroke=\"currentColor\" stroke-width=\"2.4\"\n                      stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n          </svg>\n      </span>\n    </h1>\n\n    <p class=\"lede reveal\" style=\"--d:300ms\">\n      Nella distanza di Manhattan i cerchi diventano rombi e le coniche\n      cambiano forma. Esplora la geometria del taxi, con visualizzazioni\n      e un calcolatore interattivo.\n    </p>\n\n    <div class=\"cta-row reveal\" style=\"--d:400ms\">\n      <a class=\"btn btn-primary\" href=\"#calcolatore\">\n        <svg class=\"glyph\" width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\">\n          <path d=\"M8 1 L15 8 L8 15 L1 8 Z\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n          <path d=\"M8 4.5 L8 11.5 M4.5 8 L11.5 8\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\"/>\n        </svg>\n        Apri il calcolatore\n      </a>\n      <a class=\"btn btn-ghost\" href=\"#fondamenti\">\n        Leggi la teoria\n        <span class=\"arrow tag\" aria-hidden=\"true\">→</span>\n      </a>\n    </div>\n  </div>\n\n  <!-- figura hero: rombo L₁ grande con punto-centro e alone -->\n  <figure class=\"hero-figure reveal\" style=\"--d:320ms\" aria-hidden=\"true\">\n    <span class=\"corner-tag tag\">Sfera unitaria<br>nella metrica L₁</span>\n    <svg viewBox=\"0 0 360 360\" fill=\"none\">\n      <!-- griglia tenue, solo accenni -->\n      <g stroke=\"var(--osso-velo)\" stroke-width=\"1\">\n        <line x1=\"180\" y1=\"20\" x2=\"180\" y2=\"340\"/>\n        <line x1=\"40\" y1=\"180\" x2=\"320\" y2=\"180\"/>\n        <line x1=\"110\" y1=\"50\" x2=\"110\" y2=\"310\"/>\n        <line x1=\"250\" y1=\"50\" x2=\"250\" y2=\"310\"/>\n        <line x1=\"60\" y1=\"110\" x2=\"300\" y2=\"110\"/>\n        <line x1=\"60\" y1=\"250\" x2=\"300\" y2=\"250\"/>\n      </g>\n      <!-- cerchio euclideo fantasma, circoscritto, tratteggiato -->\n      <circle cx=\"180\" cy=\"180\" r=\"140\" stroke=\"var(--neutro)\" stroke-width=\"1\"\n              stroke-dasharray=\"3 6\" opacity=\"0.5\"\n              class=\"draw\" style=\"--len:880; --d:500ms\"/>\n      <!-- rombo L₁ -->\n      <path d=\"M180 40 L320 180 L180 320 L40 180 Z\"\n            stroke=\"var(--espresso)\" stroke-width=\"2\"\n            stroke-linejoin=\"round\"\n            class=\"draw\" style=\"--len:800; --d:300ms\"/>\n      <!-- alone terracotta sul centro -->\n      <circle cx=\"180\" cy=\"180\" r=\"14\" fill=\"var(--terra-velo)\" class=\"pop\" style=\"--d:1100ms\"/>\n      <circle cx=\"180\" cy=\"180\" r=\"3.4\" fill=\"var(--terracotta)\" class=\"pop\" style=\"--d:1100ms\"/>\n      <!-- 4 vertici -->\n      <g class=\"pop\" style=\"--d:1250ms\">\n        <circle cx=\"180\" cy=\"40\"  r=\"4.2\" fill=\"var(--osso)\" stroke=\"var(--terracotta)\" stroke-width=\"1.8\"/>\n        <circle cx=\"320\" cy=\"180\" r=\"4.2\" fill=\"var(--osso)\" stroke=\"var(--terracotta)\" stroke-width=\"1.8\"/>\n        <circle cx=\"180\" cy=\"320\" r=\"4.2\" fill=\"var(--osso)\" stroke=\"var(--terracotta)\" stroke-width=\"1.8\"/>\n        <circle cx=\"40\"  cy=\"180\" r=\"4.2\" fill=\"var(--osso)\" stroke=\"var(--terracotta)\" stroke-width=\"1.8\"/>\n      </g>\n    </svg>\n    <span class=\"base-tag tag tag-terra\">r = 1</span>\n  </figure>\n</section>\n\n<!-- ============================ INDICE ============================ -->\n<section class=\"wrap indice\" id=\"fondamenti\" aria-labelledby=\"toc-title\">\n  <hr class=\"rule reveal\" style=\"--d:0ms\">\n  <div class=\"indice-head reveal\" style=\"--d:80ms\">\n    <span class=\"tag\" id=\"toc-title\">Indice — sei stazioni</span>\n    <span class=\"tag tag-terra\">L₁</span>\n  </div>\n  <nav class=\"toc\" aria-label=\"Indice delle sezioni\">\n    <a class=\"toc-item reveal\" style=\"--d:120ms\" href=\"#fondamenti\">\n      <span class=\"num\">01</span><span class=\"name\">Fondamenti</span>\n    </a>\n    <a class=\"toc-item reveal\" style=\"--d:170ms\" href=\"#circonferenza\">\n      <span class=\"num\">02</span><span class=\"name\">Circonferenza</span>\n    </a>\n    <a class=\"toc-item reveal\" style=\"--d:220ms\" href=\"#ellisse\">\n      <span class=\"num\">03</span><span class=\"name\">Ellisse</span>\n    </a>\n    <a class=\"toc-item reveal\" style=\"--d:270ms\" href=\"#iperbole\">\n      <span class=\"num\">04</span><span class=\"name\">Iperbole</span>\n    </a>\n    <a class=\"toc-item reveal\" style=\"--d:320ms\" href=\"#parabola\">\n      <span class=\"num\">05</span><span class=\"name\">Parabola</span>\n    </a>\n    <a class=\"toc-item reveal\" style=\"--d:370ms\" href=\"#calcolatore\">\n      <span class=\"num\">06</span><span class=\"name\">Calcolatore</span>\n    </a>\n  </nav>\n</section>\n\n<!-- ===================== ESTRATTO 02 ===================== -->\n<section class=\"wrap estratto\" id=\"circonferenza\" aria-labelledby=\"est-title\">\n\n  <!-- FIGURA: rombo su griglia, 4 vertici, cerchio fantasma -->\n  <figure class=\"estratto-fig reveal\" style=\"--d:120ms\" aria-label=\"Circonferenza taxicab: un rombo con i quattro vertici sui semiassi, circoscritto da un cerchio euclideo tratteggiato.\">\n    <span class=\"fig-label-top tag\">Fig. 02</span>\n    <svg viewBox=\"0 0 400 360\" fill=\"none\">\n      <!-- griglia tenue intera -->\n      <g stroke=\"var(--osso-velo)\" stroke-width=\"1\">\n        <line x1=\"40\"  y1=\"40\" x2=\"40\"  y2=\"320\"/>\n        <line x1=\"100\" y1=\"40\" x2=\"100\" y2=\"320\"/>\n        <line x1=\"160\" y1=\"40\" x2=\"160\" y2=\"320\"/>\n        <line x1=\"220\" y1=\"40\" x2=\"220\" y2=\"320\"/>\n        <line x1=\"280\" y1=\"40\" x2=\"280\" y2=\"320\"/>\n        <line x1=\"340\" y1=\"40\" x2=\"340\" y2=\"320\"/>\n        <line x1=\"40\" y1=\"40\"  x2=\"340\" y2=\"40\"/>\n        <line x1=\"40\" y1=\"100\" x2=\"340\" y2=\"100\"/>\n        <line x1=\"40\" y1=\"160\" x2=\"340\" y2=\"160\"/>\n        <line x1=\"40\" y1=\"220\" x2=\"340\" y2=\"220\"/>\n        <line x1=\"40\" y1=\"280\" x2=\"340\" y2=\"280\"/>\n      </g>\n      <!-- assi marcati -->\n      <g stroke=\"var(--linea-forte)\" stroke-width=\"1.2\">\n        <line x1=\"190\" y1=\"40\" x2=\"190\" y2=\"320\"/>\n        <line x1=\"40\" y1=\"180\" x2=\"340\" y2=\"180\"/>\n      </g>\n      <!-- cerchio euclideo fantasma, circoscritto -->\n      <circle cx=\"190\" cy=\"180\" r=\"120\" stroke=\"var(--neutro)\" stroke-width=\"1\"\n              stroke-dasharray=\"3 6\" opacity=\"0.55\"\n              class=\"draw\" style=\"--len:760; --d:600ms\"/>\n      <!-- raggio R indicato (semiasse est) -->\n      <line x1=\"190\" y1=\"180\" x2=\"310\" y2=\"180\" stroke=\"var(--terracotta)\" stroke-width=\"1.4\"\n            stroke-dasharray=\"2 4\" class=\"draw\" style=\"--len:130; --d:1000ms\"/>\n      <!-- rombo L₁ -->\n      <path d=\"M190 60 L310 180 L190 300 L70 180 Z\"\n            stroke=\"var(--espresso)\" stroke-width=\"2.2\"\n            stroke-linejoin=\"round\"\n            class=\"draw\" style=\"--len:680; --d:350ms\"/>\n      <!-- etichetta R -->\n      <text x=\"248\" y=\"172\" font-family=\"Fraunces, serif\" font-style=\"italic\"\n            font-size=\"16\" fill=\"var(--terracotta)\" class=\"pop\" style=\"--d:1150ms\">R</text>\n      <!-- centro -->\n      <circle cx=\"190\" cy=\"180\" r=\"12\" fill=\"var(--terra-velo)\" class=\"pop\" style=\"--d:1100ms\"/>\n      <circle cx=\"190\" cy=\"180\" r=\"3.2\" fill=\"var(--terracotta)\" class=\"pop\" style=\"--d:1100ms\"/>\n      <!-- 4 vertici evidenziati -->\n      <g class=\"pop\" style=\"--d:1300ms\">\n        <circle cx=\"190\" cy=\"60\"  r=\"4.6\" fill=\"var(--osso)\" stroke=\"var(--terracotta)\" stroke-width=\"2\"/>\n        <circle cx=\"310\" cy=\"180\" r=\"4.6\" fill=\"var(--osso)\" stroke=\"var(--terracotta)\" stroke-width=\"2\"/>\n        <circle cx=\"190\" cy=\"300\" r=\"4.6\" fill=\"var(--osso)\" stroke=\"var(--terracotta)\" stroke-width=\"2\"/>\n        <circle cx=\"70\"  cy=\"180\" r=\"4.6\" fill=\"var(--osso)\" stroke=\"var(--terracotta)\" stroke-width=\"2\"/>\n      </g>\n    </svg>\n    <span class=\"fig-label tag\">Rombo L₁ <span class=\"tag-terra\">·</span> cerchio euclideo, fantasma</span>\n  </figure>\n\n  <!-- TESTO -->\n  <div class=\"estratto-body\">\n    <div class=\"eyebrow reveal\" style=\"--d:160ms\">\n      <span class=\"bar\"></span>\n      <span class=\"tag tag-terra\">02 — La circonferenza taxicab</span>\n    </div>\n\n    <h2 id=\"est-title\" class=\"reveal\" style=\"--d:220ms\">\n      Un cerchio che, di fatto, è un rombo\n    </h2>\n\n    <p class=\"reveal\" style=\"--d:300ms\">\n      Il luogo dei punti a distanza <span class=\"lift\">R</span> dal centro, nella\n      metrica L₁, non è un cerchio ma un quadrato ruotato di 45°: un rombo.\n      I quattro vertici stanno sui semiassi a distanza <span class=\"lift\">R</span>.\n    </p>\n\n    <div class=\"formula reveal\" style=\"--d:380ms\" role=\"math\" aria-label=\"modulo di x meno x con c, più modulo di y meno y con c, uguale R\">\n      <svg class=\"glyph\" width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\" aria-hidden=\"true\">\n        <path d=\"M11 2 L20 11 L11 20 L2 11 Z\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      </svg>\n      <span class=\"eq\">\n        |x <span class=\"op\">−</span> x<span class=\"sub\">c</span>|\n        <span class=\"op\">+</span>\n        |y <span class=\"op\">−</span> y<span class=\"sub\">c</span>|\n        <span class=\"op\">=</span> R\n      </span>\n    </div>\n  </div>\n</section>\n</main>\n\n<!-- ============================ FOOTER ============================ -->\n<footer class=\"wrap\">\n  <div class=\"footer-row reveal\" style=\"--d:0ms\">\n    <span class=\"sig\">Un'esplorazione della metrica L₁.</span>\n    <span class=\"meta\">\n      <svg class=\"glyph\" width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\" style=\"color:var(--terracotta)\">\n        <path d=\"M7 1 L13 7 L7 13 L1 7 Z\" stroke=\"currentColor\" stroke-width=\"1.3\"/>\n      </svg>\n      Geometria del Taxi\n    </span>\n  </div>\n</footer>\n\n<script>\n/* --------------------------------------------------------------\n   reveal su scroll/load — IntersectionObserver, soffice.\n   I path \"draw\" usano la lunghezza reale del tratto per\n   un'animazione di tracciamento precisa.\n   -------------------------------------------------------------- */\n(function(){\n  var reduce = window.matchMedia &&\n               window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n  // misura la lunghezza reale di ogni path tracciato\n  document.querySelectorAll('.draw').forEach(function(el){\n    try{\n      var len = el.getTotalLength();\n      if (len && isFinite(len)){\n        el.style.setProperty('--len', Math.ceil(len));\n        el.style.strokeDasharray = Math.ceil(len);\n        el.style.strokeDashoffset = Math.ceil(len);\n      }\n    }catch(e){ /* alcuni elementi non hanno getTotalLength */ }\n  });\n\n  var targets = document.querySelectorAll('.reveal, .draw, .pop');\n\n  if (reduce || !('IntersectionObserver' in window)){\n    targets.forEach(function(el){ el.classList.add('is-in'); });\n    return;\n  }\n\n  var io = new IntersectionObserver(function(entries){\n    entries.forEach(function(e){\n      if (e.isIntersecting){\n        e.target.classList.add('is-in');\n        io.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.18, rootMargin: '0px 0px -8% 0px' });\n\n  targets.forEach(function(el){ io.observe(el); });\n})();\n<\/script>\n\n</body>\n</html>\n";
</script>
  <script>
    const PAGES = [["b1","01 · Editoriale"],["b2","02 · Brutalista"],["b3","03 · Tecnico seppia"],["b4","04 · CRT ambra"],["b5","05 · Organico"]];
    const stage = document.getElementById('stage');
    const label = document.getElementById('label');
    const dots = document.getElementById('dots');
    let cur = 0;
    PAGES.forEach((p, i) => {
      const b = document.createElement('button');
      b.type = 'button'; b.textContent = String(i + 1);
      b.setAttribute('aria-label', 'Vai alla ' + p[1]);
      b.addEventListener('click', () => load(i));
      dots.appendChild(b);
    });
    function load(i) {
      cur = (i + PAGES.length) % PAGES.length;
      stage.srcdoc = window.__BOZZE[PAGES[cur][0]];
      label.innerHTML = 'Bozza <b>' + PAGES[cur][1] + '</b>';
      [...dots.children].forEach((d, j) => d.classList.toggle('active', j === cur));
      try { location.hash = String(cur + 1); } catch (e) {}
    }
    document.getElementById('prev').addEventListener('click', () => load(cur - 1));
    document.getElementById('next').addEventListener('click', () => load(cur + 1));
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') load(cur - 1);
      else if (e.key === 'ArrowRight') load(cur + 1);
      else if (e.key >= '1' && e.key <= '5') load(+e.key - 1);
    });
    const start = Math.max(0, Math.min(PAGES.length - 1, (parseInt(location.hash.slice(1), 10) || 1) - 1));
    load(start);
  </script>
