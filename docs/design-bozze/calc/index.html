\n\n  body {\n    margin: 0;\n    height: 100vh;\n    overflow: hidden;\n    background-color: var(--paper);\n    color: var(--ink);\n    font-family: var(--body);\n    font-size: 15px;\n    line-height: 1.5;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n\n  ::selection { background: var(--cinabro); color: var(--paper); }\n\n  /* ---- griglia globale dello schermo ---- */\n  .app {\n    display: grid;\n    grid-template-columns: 312px 1fr;\n    height: 100vh;\n    width: 100vw;\n  }\n\n  /* ============================================================\n     SIDEBAR\n     ============================================================ */\n  .sidebar {\n    position: relative;\n    border-right: 1px solid var(--line);\n    background:\n      linear-gradient(to bottom, rgba(234,226,208,0.55), rgba(234,226,208,0) 120px),\n      var(--paper);\n    /* incisione tenue della griglia di Manhattan */\n    background-image:\n      linear-gradient(to right,  var(--line-soft) 1px, transparent 1px),\n      linear-gradient(to bottom, var(--line-soft) 1px, transparent 1px);\n    background-size: var(--grid) var(--grid);\n    background-position: -1px -1px;\n    display: flex;\n    flex-direction: column;\n    overflow-y: auto;\n    overflow-x: hidden;\n  }\n  /* velatura crema sopra la griglia della sidebar */\n  .sidebar::before {\n    content: \"\";\n    position: absolute; inset: 0;\n    pointer-events: none;\n    background: linear-gradient(to right, rgba(242,236,223,0.86), rgba(242,236,223,0.4) 40%, rgba(242,236,223,0.74));\n    z-index: 0;\n  }\n  .sidebar > * { position: relative; z-index: 1; }\n\n  /* fregio a scaletta L1 lungo il bordo destro della sidebar */\n  .sidebar__frieze {\n    position: absolute;\n    top: 0; right: 0; bottom: 0;\n    width: 9px;\n    pointer-events: none;\n    z-index: 2;\n  }\n  .sidebar__frieze svg { width: 100%; height: 100%; display: block; }\n\n  /* ---- header sidebar ---- */\n  .s-head {\n    padding: 18px 20px 16px;\n    border-bottom: 1px solid var(--line);\n    display: flex;\n    align-items: flex-start;\n    justify-content: space-between;\n    gap: 12px;\n  }\n  .s-head__kicker {\n    font-family: var(--mono);\n    font-size: 9.5px;\n    letter-spacing: 0.26em;\n    text-transform: uppercase;\n    color: var(--neutro);\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    margin-bottom: 7px;\n  }\n  .s-head__kicker .glyph { color: var(--cinabro); }\n  .s-head__title {\n    font-family: var(--serif);\n    font-weight: 500;\n    font-size: 25px;\n    line-height: 1.02;\n    letter-spacing: -0.018em;\n    margin: 0;\n    color: var(--ink);\n    font-optical-sizing: auto;\n  }\n  /* affordance di chiusura ESC ✕ disegnata come geometria */\n  .s-close {\n    flex-shrink: 0;\n    display: inline-flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 4px;\n    background: none;\n    border: none;\n    cursor: pointer;\n    padding: 2px;\n    color: var(--ink);\n    transition: color .2s ease, transform .2s ease;\n  }\n  .s-close:hover { color: var(--cinabro); transform: translateY(-1px); }\n  .s-close .lbl {\n    font-family: var(--mono);\n    font-size: 8.5px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--neutro);\n  }\n  .s-close:hover .lbl { color: var(--cinabro); }\n\n  /* ---- toolbar (snap + svuota) ---- */\n  .s-toolbar {\n    padding: 13px 20px;\n    border-bottom: 1px solid var(--line-soft);\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 12px;\n  }\n  .s-toolbar__group { display: flex; align-items: center; gap: 9px; }\n  .ctl-label {\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--ink-soft);\n  }\n  /* toggle geometrico ON */\n  .toggle {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    cursor: pointer;\n  }\n  .toggle__track {\n    width: 34px; height: 16px;\n    border: 1px solid var(--cinabro);\n    background: rgba(199,54,30,0.10);\n    position: relative;\n    border-radius: 1px;\n  }\n  .toggle__thumb {\n    position: absolute;\n    top: 1px; right: 1px;\n    width: 12px; height: 12px;\n    background: var(--cinabro);\n  }\n  .toggle__thumb::after {\n    content: \"\";\n    position: absolute; inset: 3px;\n    border: 1px solid var(--paper);\n  }\n  .s-clear {\n    display: inline-flex;\n    align-items: center;\n    gap: 7px;\n    background: none;\n    border: 1px solid var(--line);\n    padding: 6px 9px;\n    cursor: pointer;\n    color: var(--ink-soft);\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    transition: border-color .2s ease, color .2s ease, background .2s ease;\n  }\n  .s-clear:hover { color: var(--cinabro); border-color: var(--cinabro); background: rgba(199,54,30,0.05); }\n\n  /* ---- intestazioni di sezione ---- */\n  .s-section-head {\n    padding: 16px 20px 9px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 10px;\n  }\n  .s-section-head .ttl {\n    font-family: var(--mono);\n    font-size: 10px;\n    font-weight: 600;\n    letter-spacing: 0.24em;\n    text-transform: uppercase;\n    color: var(--neutro);\n    white-space: nowrap;\n  }\n  .s-section-head .rule { flex: 1; height: 1px; background: var(--line); }\n  .s-section-head .count { font-family: var(--mono); font-size: 10px; color: var(--cinabro); }\n\n  /* ---- lista strumenti ---- */\n  .tools { padding: 0 12px 4px; }\n  .tool {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    padding: 8px 8px;\n    border-bottom: 1px solid var(--line-soft);\n    cursor: pointer;\n    text-decoration: none;\n    color: var(--ink);\n    transition: padding-left .22s ease, color .2s ease, background .2s ease;\n  }\n  .tools .tool:first-child { border-top: 1px solid var(--line-soft); }\n  .tool:hover { color: var(--cinabro); padding-left: 14px; background: rgba(199,54,30,0.04); }\n  .tool__mark {\n    flex-shrink: 0;\n    width: 22px; height: 22px;\n    display: grid;\n    place-items: center;\n  }\n  .tool__name {\n    font-family: var(--serif);\n    font-size: 16px;\n    font-weight: 400;\n    letter-spacing: -0.005em;\n    flex: 1;\n  }\n  .tool__key {\n    font-family: var(--mono);\n    font-size: 9.5px;\n    color: var(--neutro-lt);\n    letter-spacing: 0.08em;\n  }\n  .tool:hover .tool__key { color: var(--cinabro); }\n\n  /* ---- card oggetto (accordion aperto) ---- */\n  .objects { padding: 0 12px 18px; }\n  .obj-card {\n    border: 1px solid var(--line);\n    background: var(--paper);\n    box-shadow: 6px 6px 0 -1px var(--paper-deep);\n  }\n  .obj-card__head {\n    display: flex;\n    align-items: center;\n    gap: 11px;\n    padding: 11px 13px;\n    border-bottom: 1px solid var(--line-soft);\n    cursor: pointer;\n  }\n  .obj-card__head .swatch {\n    width: 18px; height: 18px;\n    display: grid; place-items: center;\n    flex-shrink: 0;\n  }\n  .obj-card__head .name {\n    font-family: var(--serif);\n    font-size: 17px;\n    font-weight: 500;\n    flex: 1;\n    letter-spacing: -0.01em;\n  }\n  .obj-card__head .name em { font-style: italic; color: var(--cinabro); font-weight: 400; }\n  .obj-card__head .chev { color: var(--neutro); }\n\n  .obj-card__body { padding: 13px 14px 14px; }\n\n  .readout {\n    font-family: var(--mono);\n    font-size: 12px;\n    letter-spacing: 0.02em;\n    color: var(--ink-soft);\n    line-height: 1.7;\n  }\n  .readout .lab {\n    font-size: 9px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--neutro);\n    display: block;\n    margin-bottom: 2px;\n  }\n  .readout .foci { color: var(--ink); }\n  .readout .foci b { color: var(--cinabro); font-weight: 600; }\n\n  /* slider statico */\n  .slider {\n    margin: 15px 0 4px;\n  }\n  .slider__top {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    margin-bottom: 8px;\n  }\n  .slider__name {\n    font-family: var(--mono);\n    font-size: 9px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--neutro);\n  }\n  .slider__val {\n    font-family: var(--mono);\n    font-size: 12px;\n    color: var(--cinabro);\n    font-weight: 600;\n  }\n  .slider__track {\n    position: relative;\n    height: 14px;\n  }\n  .slider__rail {\n    position: absolute;\n    top: 6px; left: 0; right: 0;\n    height: 1px;\n    background: var(--line);\n  }\n  .slider__fill {\n    position: absolute;\n    top: 6px; left: 0;\n    width: 58%;\n    height: 1px;\n    background: var(--cinabro);\n  }\n  .slider__thumb {\n    position: absolute;\n    top: 0; left: 58%;\n    transform: translateX(-50%) rotate(45deg);\n    width: 11px; height: 11px;\n    background: var(--paper);\n    border: 1.4px solid var(--cinabro);\n  }\n  /* ticks della scaletta sotto lo slider */\n  .slider__ticks {\n    display: flex;\n    justify-content: space-between;\n    margin-top: 7px;\n    font-family: var(--mono);\n    font-size: 8.5px;\n    color: var(--neutro-lt);\n    letter-spacing: 0.06em;\n  }\n\n  .obj-out {\n    margin-top: 12px;\n    padding-top: 11px;\n    border-top: 1px solid var(--line-soft);\n    font-family: var(--mono);\n    font-size: 12px;\n    color: var(--ink-soft);\n  }\n  .obj-out b { color: var(--cinabro); font-weight: 600; }\n\n  /* disclosure analisi regioni */\n  .disclosure {\n    margin-top: 12px;\n    display: flex;\n    align-items: center;\n    gap: 9px;\n    padding: 9px 0;\n    border-top: 1px solid var(--line-soft);\n    border-bottom: 1px solid var(--line-soft);\n    cursor: pointer;\n    color: var(--ink);\n    transition: color .2s ease;\n  }\n  .disclosure:hover { color: var(--cinabro); }\n  .disclosure .txt {\n    font-family: var(--body);\n    font-style: italic;\n    font-size: 14px;\n    flex: 1;\n  }\n  .disclosure .badge {\n    font-family: var(--mono);\n    font-size: 9px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--neutro);\n    border: 1px solid var(--line);\n    padding: 2px 6px;\n  }\n\n  /* azioni isola / elimina */\n  .obj-actions {\n    margin-top: 13px;\n    display: flex;\n    gap: 9px;\n  }\n  .obj-actions button {\n    flex: 1;\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    gap: 7px;\n    background: none;\n    border: 1px solid var(--line);\n    padding: 8px 6px;\n    cursor: pointer;\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--ink-soft);\n    transition: border-color .2s ease, color .2s ease, background .2s ease;\n  }\n  .obj-actions button:hover { color: var(--cinabro); border-color: var(--cinabro); background: rgba(199,54,30,0.05); }\n  .obj-actions button.danger:hover { color: var(--cinabro-dk); border-color: var(--cinabro-dk); }\n\n  /* piè di sidebar */\n  .s-foot {\n    margin-top: auto;\n    padding: 13px 20px 16px;\n    border-top: 1px solid var(--line);\n    font-family: var(--mono);\n    font-size: 9px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--neutro-lt);\n    line-height: 1.7;\n  }\n  .s-foot .glyph { color: var(--cinabro); margin-right: 7px; vertical-align: middle; }\n\n  /* ============================================================\n     AREA CANVAS\n     ============================================================ */\n  .canvas-wrap {\n    position: relative;\n    overflow: hidden;\n    background: var(--paper);\n    display: flex;\n    flex-direction: column;\n  }\n\n  /* intestazione marginale dell'area (marginalia) */\n  .canvas-margin {\n    position: absolute;\n    top: 16px; left: 22px;\n    z-index: 5;\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--neutro);\n    pointer-events: none;\n  }\n  .canvas-margin b { color: var(--cinabro); font-weight: 600; }\n  .canvas-folio {\n    position: absolute;\n    top: 8px; right: 26px;\n    z-index: 4;\n    font-family: var(--serif);\n    font-weight: 300;\n    font-size: 92px;\n    line-height: 0.8;\n    color: var(--paper-tint);\n    letter-spacing: -0.03em;\n    user-select: none;\n    pointer-events: none;\n  }\n  .canvas-folio b { font-style: italic; color: var(--paper-deep); }\n\n  .canvas-stage {\n    flex: 1;\n    position: relative;\n    min-height: 0;\n  }\n  .canvas-stage svg.scene {\n    position: absolute;\n    inset: 0;\n    width: 100%;\n    height: 100%;\n    display: block;\n  }\n\n  /* pannello equazione (card editoriale, overlay) */\n  .eqbox {\n    position: absolute;\n    top: 64px; right: 26px;\n    z-index: 6;\n    width: 326px;\n    background: var(--paper);\n    border: 1px solid var(--line);\n    box-shadow: 14px 14px 0 -1px var(--paper-deep);\n  }\n  .eqbox__bar {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 8px 13px;\n    border-bottom: 1px solid var(--line);\n    font-family: var(--mono);\n    font-size: 9px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--neutro);\n  }\n  .eqbox__bar .no { color: var(--cinabro); font-weight: 600; }\n  .eqbox__body { padding: 14px 15px 15px; }\n  .eqbox__eq {\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: 17px;\n    line-height: 1.5;\n    color: var(--ink);\n    letter-spacing: 0.01em;\n  }\n  .eqbox__eq .op { color: var(--cinabro); font-style: normal; padding: 0 1px; }\n  .eqbox__eq sub { font-size: 0.58em; font-style: normal; color: var(--neutro); }\n  .eqbox__hr {\n    border: none;\n    border-top: 1px solid var(--line-soft);\n    margin: 13px 0;\n  }\n  .eqbox__region {\n    font-family: var(--mono);\n    font-size: 9px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--neutro);\n    margin-bottom: 8px;\n  }\n  .eqbox__step {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    font-family: var(--mono);\n    font-size: 15px;\n    color: var(--ink);\n  }\n  .eqbox__step .a { color: var(--ink-soft); }\n  .eqbox__step .arrow { color: var(--cinabro); }\n  .eqbox__step .b { color: var(--cinabro); font-weight: 600; }\n\n  /* barra di stato in basso */\n  .statusbar {\n    flex-shrink: 0;\n    border-top: 1px solid var(--line);\n    background: var(--paper-deep);\n    padding: 8px 18px;\n    display: flex;\n    align-items: center;\n    gap: 0;\n    flex-wrap: wrap;\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.04em;\n    color: var(--ink-soft);\n  }\n  .statusbar .seg { display: inline-flex; align-items: center; gap: 6px; }\n  .statusbar .sep { color: var(--line); padding: 0 13px; }\n  .statusbar .k { color: var(--neutro); text-transform: uppercase; font-size: 9px; letter-spacing: 0.16em; }\n  .statusbar .v { color: var(--ink); }\n  .statusbar .v.acc { color: var(--cinabro); font-weight: 600; }\n  .statusbar .snap-on {\n    display: inline-flex; align-items: center; gap: 6px;\n    color: var(--cinabro);\n  }\n\n  /* ============================================================\n     ANIMAZIONE D'INGRESSO — un solo reveal staggered\n     ============================================================ */\n  @keyframes rise {\n    from { opacity: 0; transform: translateY(14px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n  @keyframes sceneFade {\n    from { opacity: 0; }\n    to   { opacity: 1; }\n  }\n  .reveal {\n    opacity: 0;\n    animation: rise .8s cubic-bezier(.2,.7,.2,1) forwards;\n    animation-delay: var(--d, 0s);\n  }\n  .scene-el {\n    opacity: 0;\n    animation: sceneFade .7s ease forwards;\n    animation-delay: var(--d, 0s);\n  }\n\n  @media (prefers-reduced-motion: reduce) {\n    .reveal, .scene-el {\n      animation: none !important;\n      opacity: 1 !important;\n      transform: none !important;\n    }\n  }\n\n  /* responsive di cortesia (non l'obiettivo, ma evita il collasso) */\n  @media (max-width: 760px) {\n    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }\n    .sidebar { max-height: 46vh; }\n    .eqbox { display: none; }\n    .canvas-folio { font-size: 60px; }\n  }\n</style>\n</head>\n\n<body>\n<div class=\"app\">\n\n  <!-- ============================================================\n       SIDEBAR\n       ============================================================ -->\n  <aside class=\"sidebar\">\n\n    <!-- fregio a scaletta L1 sul bordo destro -->\n    <div class=\"sidebar__frieze\" aria-hidden=\"true\">\n      <svg viewBox=\"0 0 9 600\" preserveAspectRatio=\"none\">\n        <path d=\"M4.5 0 V20 H8 V40 H1 V60 H8 V80 H1 V100 H8 V120 H1 V140 H8 V160 H1 V180\n                 H8 V200 H1 V220 H8 V240 H1 V260 H8 V280 H1 V300 H8 V320 H1 V340 H8 V360\n                 H1 V380 H8 V400 H1 V420 H8 V440 H1 V460 H8 V480 H1 V500 H8 V520 H1 V540\n                 H8 V560 H1 V580 H8 V600\"\n              fill=\"none\" stroke=\"var(--line)\" stroke-width=\"1\"/>\n        <path d=\"M1 280 H8 V300 H1 V320\" fill=\"none\" stroke=\"var(--cinabro)\" stroke-width=\"1.4\"/>\n      </svg>\n    </div>\n\n    <!-- ---- HEADER ---- -->\n    <div class=\"s-head reveal\" style=\"--d:0s\">\n      <div>\n        <div class=\"s-head__kicker\">\n          <svg class=\"glyph\" width=\"11\" height=\"11\" viewBox=\"0 0 13 13\" aria-hidden=\"true\"><path d=\"M6.5 0.7 L12.3 6.5 L6.5 12.3 L0.7 6.5 Z\" fill=\"currentColor\"/></svg>\n          Geometria del Taxi · L₁\n        </div>\n        <h1 class=\"s-head__title\">Calcolatore<br/>Grafico</h1>\n      </div>\n      <!-- chiusura ESC ✕ disegnata: parentesi quadra + croce -->\n      <button class=\"s-close\" aria-label=\"Chiudi (Esc)\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n          <path d=\"M5 2 H2 V20 H5 M17 2 H20 V20 H17\" fill=\"none\" stroke=\"var(--neutro)\" stroke-width=\"1.3\"/>\n          <path d=\"M8 8 L14 14 M14 8 L8 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/>\n        </svg>\n        <span class=\"lbl\">Esc</span>\n      </button>\n    </div>\n\n    <!-- ---- TOOLBAR ---- -->\n    <div class=\"s-toolbar reveal\" style=\"--d:.06s\">\n      <label class=\"toggle\" aria-label=\"Snap attivo\">\n        <span class=\"toggle__track\"><span class=\"toggle__thumb\"></span></span>\n        <span class=\"ctl-label\">Snap</span>\n      </label>\n      <button class=\"s-clear\" type=\"button\">\n        <!-- icona cestino / linea -->\n        <svg width=\"13\" height=\"14\" viewBox=\"0 0 13 14\" aria-hidden=\"true\">\n          <path d=\"M1 3 H12 M4 3 V1.5 H9 V3 M2.5 3 L3.4 13 H9.6 L10.5 3 M5 5.5 V10.5 M8 5.5 V10.5\"\n                fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.1\" stroke-linejoin=\"round\"/>\n        </svg>\n        Svuota\n      </button>\n    </div>\n\n    <!-- ---- CREA OGGETTO ---- -->\n    <div class=\"s-section-head reveal\" style=\"--d:.12s\">\n      <span class=\"ttl\">Crea oggetto</span>\n      <span class=\"rule\"></span>\n    </div>\n\n    <nav class=\"tools reveal\" style=\"--d:.16s\" aria-label=\"Strumenti di costruzione\">\n\n      <!-- Asse — bisettrice perpendicolare -->\n      <a class=\"tool\" href=\"#\">\n        <span class=\"tool__mark\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n          <line x1=\"2\" y1=\"15\" x2=\"20\" y2=\"7\" stroke=\"var(--neutro)\" stroke-width=\"1.2\"/>\n          <line x1=\"11\" y1=\"2\" x2=\"11\" y2=\"20\" stroke=\"var(--cinabro)\" stroke-width=\"1.6\" stroke-dasharray=\"2.5 2.5\"/>\n          <circle cx=\"5\" cy=\"13.7\" r=\"1.6\" fill=\"var(--neutro)\"/>\n          <circle cx=\"17\" cy=\"8.3\" r=\"1.6\" fill=\"var(--neutro)\"/>\n        </svg></span>\n        <span class=\"tool__name\">Asse</span>\n        <span class=\"tool__key\">A</span>\n      </a>\n\n      <!-- Circonferenza — rombo taxicab -->\n      <a class=\"tool\" href=\"#\">\n        <span class=\"tool__mark\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n          <path d=\"M11 2 L20 11 L11 20 L2 11 Z\" fill=\"rgba(199,54,30,0.06)\" stroke=\"var(--cinabro)\" stroke-width=\"1.5\"/>\n        </svg></span>\n        <span class=\"tool__name\">Circonferenza</span>\n        <span class=\"tool__key\">C</span>\n      </a>\n\n      <!-- Ellisse — ottagono -->\n      <a class=\"tool\" href=\"#\">\n        <span class=\"tool__mark\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n          <path d=\"M7 3 L15 3 L19 7 L19 15 L15 19 L7 19 L3 15 L3 7 Z\" fill=\"rgba(199,54,30,0.06)\" stroke=\"var(--cinabro)\" stroke-width=\"1.4\"/>\n        </svg></span>\n        <span class=\"tool__name\">Ellisse</span>\n        <span class=\"tool__key\">E</span>\n      </a>\n\n      <!-- Iperbole — due archi opposti -->\n      <a class=\"tool\" href=\"#\">\n        <span class=\"tool__mark\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n          <path d=\"M8 2 L4 11 L8 20\" fill=\"none\" stroke=\"var(--cinabro)\" stroke-width=\"1.5\" stroke-linejoin=\"round\"/>\n          <path d=\"M14 2 L18 11 L14 20\" fill=\"none\" stroke=\"var(--cinabro)\" stroke-width=\"1.5\" stroke-linejoin=\"round\"/>\n        </svg></span>\n        <span class=\"tool__name\">Iperbole</span>\n        <span class=\"tool__key\">I</span>\n      </a>\n\n      <!-- Parabola — curva aperta -->\n      <a class=\"tool\" href=\"#\">\n        <span class=\"tool__mark\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n          <path d=\"M3 3 L8 11 L11 16 L14 11 L19 3\" fill=\"none\" stroke=\"var(--cinabro)\" stroke-width=\"1.5\" stroke-linejoin=\"round\"/>\n        </svg></span>\n        <span class=\"tool__name\">Parabola</span>\n        <span class=\"tool__key\">P</span>\n      </a>\n\n      <!-- Luogo — locus tratteggiato -->\n      <a class=\"tool\" href=\"#\">\n        <span class=\"tool__mark\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n          <circle cx=\"3.5\" cy=\"14\" r=\"1.3\" fill=\"var(--cinabro)\"/>\n          <circle cx=\"7\" cy=\"9\" r=\"1.3\" fill=\"var(--cinabro)\"/>\n          <circle cx=\"11\" cy=\"6\" r=\"1.3\" fill=\"var(--cinabro)\"/>\n          <circle cx=\"15\" cy=\"9\" r=\"1.3\" fill=\"var(--cinabro)\"/>\n          <circle cx=\"18.5\" cy=\"14\" r=\"1.3\" fill=\"var(--cinabro)\"/>\n        </svg></span>\n        <span class=\"tool__name\">Luogo</span>\n        <span class=\"tool__key\">L</span>\n      </a>\n\n      <!-- Distanza — segmento con tacche -->\n      <a class=\"tool\" href=\"#\">\n        <span class=\"tool__mark\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n          <line x1=\"4\" y1=\"11\" x2=\"18\" y2=\"11\" stroke=\"var(--cinabro)\" stroke-width=\"1.5\"/>\n          <line x1=\"4\" y1=\"6\" x2=\"4\" y2=\"16\" stroke=\"var(--cinabro)\" stroke-width=\"1.5\"/>\n          <line x1=\"18\" y1=\"6\" x2=\"18\" y2=\"16\" stroke=\"var(--cinabro)\" stroke-width=\"1.5\"/>\n        </svg></span>\n        <span class=\"tool__name\">Distanza</span>\n        <span class=\"tool__key\">D</span>\n      </a>\n\n    </nav>\n\n    <!-- ---- OGGETTI ---- -->\n    <div class=\"s-section-head reveal\" style=\"--d:.26s\">\n      <span class=\"ttl\">Oggetti</span>\n      <span class=\"count\">(1)</span>\n      <span class=\"rule\"></span>\n    </div>\n\n    <div class=\"objects reveal\" style=\"--d:.30s\">\n      <article class=\"obj-card\">\n        <header class=\"obj-card__head\">\n          <span class=\"swatch\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n            <path d=\"M7 3 L15 3 L19 7 L19 15 L15 19 L7 19 L3 15 L3 7 Z\" fill=\"rgba(199,54,30,0.10)\" stroke=\"var(--cinabro)\" stroke-width=\"1.5\"/>\n          </svg></span>\n          <span class=\"name\">Ellisse <em>#1</em></span>\n          <!-- chevron aperto (accordion espanso) -->\n          <svg class=\"chev\" width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" aria-hidden=\"true\">\n            <path d=\"M2 7.5 L6 3.5 L10 7.5\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n          </svg>\n        </header>\n\n        <div class=\"obj-card__body\">\n\n          <div class=\"readout\">\n            <span class=\"lab\">Fuochi</span>\n            <span class=\"foci\">F<sub>1</sub>(<b>−2</b>,<b>−1</b>) &nbsp;·&nbsp; F<sub>2</sub>(<b>2</b>,<b>1</b>)</span>\n          </div>\n\n          <!-- slider statico S = 8 (somma 2a) -->\n          <div class=\"slider\">\n            <div class=\"slider__top\">\n              <span class=\"slider__name\">S — somma 2a</span>\n              <span class=\"slider__val\">S = 8</span>\n            </div>\n            <div class=\"slider__track\">\n              <span class=\"slider__rail\"></span>\n              <span class=\"slider__fill\"></span>\n              <span class=\"slider__thumb\"></span>\n            </div>\n            <div class=\"slider__ticks\"><span>6</span><span>8</span><span>10</span><span>12</span><span>14</span></div>\n          </div>\n\n          <div class=\"obj-out\">d<sub>0</sub> = <b>6.00</b> &nbsp;·&nbsp; k = <b>1.00</b></div>\n\n          <!-- disclosure analisi regioni -->\n          <div class=\"disclosure\" role=\"button\" tabindex=\"0\">\n            <svg width=\"11\" height=\"11\" viewBox=\"0 0 11 11\" aria-hidden=\"true\">\n              <path d=\"M5.5 1 V10 M1 5.5 H10\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.3\"/>\n            </svg>\n            <span class=\"txt\">Analisi regioni e equazioni</span>\n            <span class=\"badge\">9 reg.</span>\n          </div>\n\n          <!-- azioni -->\n          <div class=\"obj-actions\">\n            <button type=\"button\">\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 13 13\" aria-hidden=\"true\">\n                <circle cx=\"6.5\" cy=\"6.5\" r=\"2.4\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\"/>\n                <path d=\"M6.5 0.5 V2.4 M6.5 10.6 V12.5 M0.5 6.5 H2.4 M10.6 6.5 H12.5\" stroke=\"currentColor\" stroke-width=\"1.2\"/>\n              </svg>\n              Isola\n            </button>\n            <button type=\"button\" class=\"danger\">\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 13 13\" aria-hidden=\"true\">\n                <path d=\"M1 3 H12 M4 3 V1.5 H9 V3 M2.7 3 L3.5 12 H9.5 L10.3 3\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.1\" stroke-linejoin=\"round\"/>\n              </svg>\n              Elimina\n            </button>\n          </div>\n\n        </div>\n      </article>\n    </div>\n\n    <!-- ---- PIÈ ---- -->\n    <div class=\"s-foot reveal\" style=\"--d:.36s\">\n      <svg class=\"glyph\" width=\"10\" height=\"10\" viewBox=\"0 0 13 13\" aria-hidden=\"true\"><path d=\"M6.5 0.7 L12.3 6.5 L6.5 12.3 L0.7 6.5 Z\" fill=\"currentColor\"/></svg>\n      Metrica L₁ · d(P,Q)=|Δx|+|Δy|<br/>Carta · Inchiostro · Cinabro\n    </div>\n\n  </aside>\n\n  <!-- ============================================================\n       AREA CANVAS\n       ============================================================ -->\n  <section class=\"canvas-wrap\">\n\n    <div class=\"canvas-margin reveal\" style=\"--d:.20s\">Tavola <b>·</b> Ellisse taxicab · 2a = 8</div>\n    <div class=\"canvas-folio reveal\" style=\"--d:.22s\" aria-hidden=\"true\">E<b>1</b></div>\n\n    <!-- pannello equazione (overlay) -->\n    <aside class=\"eqbox reveal\" style=\"--d:.66s\">\n      <div class=\"eqbox__bar\"><span>Derivazione</span><span class=\"no\">Reg. 02</span></div>\n      <div class=\"eqbox__body\">\n        <div class=\"eqbox__eq\">\n          |x <span class=\"op\">−</span> x<sub>1</sub>| <span class=\"op\">+</span> |y <span class=\"op\">−</span> y<sub>1</sub>|\n          <span class=\"op\">+</span> |x <span class=\"op\">−</span> x<sub>2</sub>| <span class=\"op\">+</span> |y <span class=\"op\">−</span> y<sub>2</sub>| <span class=\"op\">=</span> 2a\n        </div>\n        <hr class=\"eqbox__hr\"/>\n        <div class=\"eqbox__region\">Istanza · regione superiore (x<sub>1</sub>≤x≤x<sub>2</sub>, y≥y<sub>2</sub>)</div>\n        <div class=\"eqbox__step\">\n          <span class=\"a\">2x + 2y = 8</span>\n          <span class=\"arrow\">→</span>\n          <span class=\"b\">y = −x + 4</span>\n        </div>\n      </div>\n    </aside>\n\n    <!-- ---- SCENA ---- -->\n    <div class=\"canvas-stage\">\n      <!--\n        Trasformazione mondo→pixel: px = 450 + wx*70 ; py = 300 − wy*70\n        viewBox 0 0 900 600. Griglia 70px = 1 unità. Centro (0,0) = (450,300).\n        Ottagono ellisse taxicab, fuochi F1(-2,-1) F2(2,1), 2a=8 — vertici verificati\n        algebricamente: (3,1)(2,2)(-2,2)(-3,1)(-3,-1)(-2,-2)(2,-2)(3,-1).\n      -->\n      <svg class=\"scene\" viewBox=\"0 0 900 600\" role=\"img\"\n           aria-label=\"Ellisse taxicab a forma di ottagono con fuochi F1(-2,-1) e F2(2,1), linee critiche, punto P e percorsi di Manhattan a scaletta\">\n        <defs>\n          <pattern id=\"mgrid\" width=\"70\" height=\"70\" patternUnits=\"userSpaceOnUse\">\n            <path d=\"M70 0 H0 V70\" fill=\"none\" stroke=\"var(--line-soft)\" stroke-width=\"1\"/>\n          </pattern>\n          <pattern id=\"mgrid-minor\" width=\"14\" height=\"14\" patternUnits=\"userSpaceOnUse\">\n            <path d=\"M14 0 H0 V14\" fill=\"none\" stroke=\"#E2D9C5\" stroke-width=\"0.6\"/>\n          </pattern>\n        </defs>\n\n        <!-- carta squadrata: minore + maggiore -->\n        <rect class=\"scene-el\" style=\"--d:.20s\" x=\"0\" y=\"0\" width=\"900\" height=\"600\" fill=\"url(#mgrid-minor)\"/>\n        <rect class=\"scene-el\" style=\"--d:.22s\" x=\"0\" y=\"0\" width=\"900\" height=\"600\" fill=\"url(#mgrid)\"/>\n\n        <!-- assi cartesiani attraverso il centro (0,0)=(450,300) -->\n        <g class=\"scene-el\" style=\"--d:.30s\" stroke=\"var(--line)\" stroke-width=\"1.4\">\n          <line x1=\"30\" y1=\"300\" x2=\"870\" y2=\"300\"/>\n          <line x1=\"450\" y1=\"20\" x2=\"450\" y2=\"580\"/>\n        </g>\n        <!-- frecce assi -->\n        <g class=\"scene-el\" style=\"--d:.30s\" fill=\"none\" stroke=\"var(--neutro)\" stroke-width=\"1.2\">\n          <path d=\"M862 295 L870 300 L862 305\"/>\n          <path d=\"M445 28 L450 20 L455 28\"/>\n        </g>\n\n        <!-- numeri assi (mono) -->\n        <g class=\"scene-el\" style=\"--d:.34s\" font-family=\"IBM Plex Mono, monospace\" font-size=\"11\" fill=\"var(--neutro)\">\n          <!-- x: -5..5 (skip 0) -->\n          <text x=\"100\"  y=\"316\" text-anchor=\"middle\">−5</text>\n          <text x=\"170\"  y=\"316\" text-anchor=\"middle\">−4</text>\n          <text x=\"240\"  y=\"316\" text-anchor=\"middle\">−3</text>\n          <text x=\"310\"  y=\"316\" text-anchor=\"middle\">−2</text>\n          <text x=\"380\"  y=\"316\" text-anchor=\"middle\">−1</text>\n          <text x=\"520\"  y=\"316\" text-anchor=\"middle\">1</text>\n          <text x=\"590\"  y=\"316\" text-anchor=\"middle\">2</text>\n          <text x=\"660\"  y=\"316\" text-anchor=\"middle\">3</text>\n          <text x=\"730\"  y=\"316\" text-anchor=\"middle\">4</text>\n          <text x=\"800\"  y=\"316\" text-anchor=\"middle\">5</text>\n          <!-- y: -3..3 (skip 0) -->\n          <text x=\"438\" y=\"514\" text-anchor=\"end\">−3</text>\n          <text x=\"438\" y=\"444\" text-anchor=\"end\">−2</text>\n          <text x=\"438\" y=\"374\" text-anchor=\"end\">−1</text>\n          <text x=\"438\" y=\"234\" text-anchor=\"end\">1</text>\n          <text x=\"438\" y=\"164\" text-anchor=\"end\">2</text>\n          <text x=\"438\" y=\"94\"  text-anchor=\"end\">3</text>\n          <!-- origine -->\n          <text x=\"438\" y=\"316\" text-anchor=\"end\" fill=\"var(--neutro-lt)\">0</text>\n          <!-- etichette assi -->\n          <text x=\"864\" y=\"290\" text-anchor=\"end\" fill=\"var(--ink-soft)\" font-size=\"12\">x</text>\n          <text x=\"460\" y=\"32\"  fill=\"var(--ink-soft)\" font-size=\"12\">y</text>\n        </g>\n\n        <!-- LINEE CRITICHE tratteggiate: x=−2(310), x=2(590), y=−1(370), y=1(230) -->\n        <g class=\"scene-el\" style=\"--d:.46s\" stroke=\"var(--neutro)\" stroke-width=\"1\" stroke-dasharray=\"3 5\" opacity=\"0.62\">\n          <line x1=\"310\" y1=\"40\" x2=\"310\" y2=\"560\"/>\n          <line x1=\"590\" y1=\"40\" x2=\"590\" y2=\"560\"/>\n          <line x1=\"60\"  y1=\"370\" x2=\"840\" y2=\"370\"/>\n          <line x1=\"60\"  y1=\"230\" x2=\"840\" y2=\"230\"/>\n        </g>\n        <g class=\"scene-el\" style=\"--d:.48s\" font-family=\"IBM Plex Mono, monospace\" font-size=\"9.5\" fill=\"var(--neutro-lt)\" letter-spacing=\"0.5\">\n          <text x=\"314\" y=\"54\">x=−2</text>\n          <text x=\"594\" y=\"54\">x=2</text>\n          <text x=\"64\"  y=\"366\">y=−1</text>\n          <text x=\"64\"  y=\"226\">y=1</text>\n        </g>\n\n        <!-- OTTAGONO = ellisse taxicab (2a=8) -->\n        <polygon class=\"scene-el\" style=\"--d:.54s\"\n          points=\"660,230 590,160 310,160 240,230 240,370 310,440 590,440 660,370\"\n          fill=\"rgba(199,54,30,0.055)\"\n          stroke=\"var(--cinabro)\" stroke-width=\"2.2\"\n          stroke-linejoin=\"miter\"/>\n\n        <!-- percorsi a scaletta (Manhattan) da P(0,2)=(450,160) -->\n        <!-- P->F1(-2,-1)=(310,370): d1 = 5 -->\n        <polyline class=\"scene-el\" style=\"--d:.78s\"\n          points=\"450,160 450,230 380,230 380,300 310,300 310,370\"\n          fill=\"none\" stroke=\"var(--cinabro)\" stroke-width=\"1.7\"\n          stroke-dasharray=\"1.5 5\" stroke-linecap=\"round\" opacity=\"0.9\"/>\n        <!-- P->F2(2,1)=(590,230): d2 = 3 -->\n        <polyline class=\"scene-el\" style=\"--d:.82s\"\n          points=\"450,160 520,160 520,230 590,230\"\n          fill=\"none\" stroke=\"var(--cinabro-dk)\" stroke-width=\"1.7\"\n          stroke-dasharray=\"5 4\" stroke-linecap=\"round\" opacity=\"0.92\"/>\n\n        <!-- linee critiche dei fuochi: croci 1px -->\n        <g class=\"scene-el\" style=\"--d:.60s\" stroke=\"var(--ink)\" stroke-width=\"1\">\n          <line x1=\"304\" y1=\"370\" x2=\"316\" y2=\"370\"/><line x1=\"310\" y1=\"364\" x2=\"310\" y2=\"376\"/>\n          <line x1=\"584\" y1=\"230\" x2=\"596\" y2=\"230\"/><line x1=\"590\" y1=\"224\" x2=\"590\" y2=\"236\"/>\n        </g>\n\n        <!-- FUOCHI -->\n        <g class=\"scene-el\" style=\"--d:.64s\">\n          <circle cx=\"310\" cy=\"370\" r=\"5.4\" fill=\"var(--cinabro)\" stroke=\"var(--paper)\" stroke-width=\"1.8\"/>\n          <circle cx=\"590\" cy=\"230\" r=\"5.4\" fill=\"var(--cinabro)\" stroke=\"var(--paper)\" stroke-width=\"1.8\"/>\n        </g>\n        <g class=\"scene-el\" style=\"--d:.66s\" font-family=\"IBM Plex Mono, monospace\" font-size=\"12\" fill=\"var(--ink)\">\n          <text x=\"296\" y=\"390\" text-anchor=\"end\">F<tspan font-size=\"8\" dy=\"3\">1</tspan><tspan dy=\"-3\">(−2,−1)</tspan></text>\n          <text x=\"604\" y=\"224\">F<tspan font-size=\"8\" dy=\"3\">2</tspan><tspan dy=\"-3\">(2,1)</tspan></text>\n        </g>\n\n        <!-- PUNTO P sul bordo dell'ottagono: P(0,2)=(450,160) -->\n        <g class=\"scene-el\" style=\"--d:.86s\">\n          <circle cx=\"450\" cy=\"160\" r=\"5.6\" fill=\"var(--paper)\" stroke=\"var(--cinabro)\" stroke-width=\"2.2\"/>\n          <circle cx=\"450\" cy=\"160\" r=\"1.8\" fill=\"var(--cinabro)\"/>\n          <text x=\"450\" y=\"146\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"12.5\" fill=\"var(--cinabro)\" font-weight=\"600\">P</text>\n        </g>\n\n        <!-- etichette distanze lungo i percorsi -->\n        <g class=\"scene-el\" style=\"--d:.9s\" font-family=\"IBM Plex Mono, monospace\" font-size=\"11\" fill=\"var(--cinabro-dk)\">\n          <text x=\"356\" y=\"296\" text-anchor=\"end\">d₁ = 5</text>\n          <text x=\"540\" y=\"204\">d₂ = 3</text>\n        </g>\n      </svg>\n    </div>\n\n    <!-- ---- BARRA DI STATO ---- -->\n    <div class=\"statusbar reveal\" style=\"--d:.6s\">\n      <span class=\"seg\"><span class=\"k\">P</span><span class=\"v\">(0.00, 2.00)</span></span>\n      <span class=\"sep\">·</span>\n      <span class=\"seg\"><span class=\"k\">d₁</span><span class=\"v\">5.00</span></span>\n      <span class=\"sep\">·</span>\n      <span class=\"seg\"><span class=\"k\">d₂</span><span class=\"v\">3.00</span></span>\n      <span class=\"sep\">·</span>\n      <span class=\"seg\"><span class=\"k\">somma</span><span class=\"v acc\">8.00</span></span>\n      <span class=\"sep\">·</span>\n      <span class=\"seg\"><span class=\"k\">scala</span><span class=\"v\">70 px / u</span></span>\n      <span class=\"sep\">·</span>\n      <span class=\"seg snap-on\">\n        <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" aria-hidden=\"true\">\n          <circle cx=\"2\" cy=\"2\" r=\"1\" fill=\"currentColor\"/><circle cx=\"6\" cy=\"2\" r=\"1\" fill=\"currentColor\"/><circle cx=\"10\" cy=\"2\" r=\"1\" fill=\"currentColor\"/>\n          <circle cx=\"2\" cy=\"6\" r=\"1\" fill=\"currentColor\"/><circle cx=\"6\" cy=\"6\" r=\"1.6\" fill=\"currentColor\"/><circle cx=\"10\" cy=\"6\" r=\"1\" fill=\"currentColor\"/>\n          <circle cx=\"2\" cy=\"10\" r=\"1\" fill=\"currentColor\"/><circle cx=\"6\" cy=\"10\" r=\"1\" fill=\"currentColor\"/><circle cx=\"10\" cy=\"10\" r=\"1\" fill=\"currentColor\"/>\n        </svg>\n        <span class=\"k\" style=\"color:inherit\">snap:</span><span>on</span>\n      </span>\n    </div>\n\n  </section>\n\n</div>\n</body>\n</html>\n";
window.__BOZZE["c2"]="<!DOCTYPE html>\n<html lang=\"it\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Calcolatore Grafico — Geometria del Taxi · Brutalista</title>\n<meta name=\"description\" content=\"Mockup statico del calcolatore grafico della Geometria del Taxi, direzione estetica Brutalista.\">\n\n<!-- Fonts: Bricolage Grotesque (display) + IBM Plex Mono (tecnico) -->\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap\" rel=\"stylesheet\">\n\n<style>\n/* ============================================================\n   CALCOLATORE GRAFICO — Mockup \"Brutalista\"\n   Palette: bone #E9E5DC · nero #0A0A0A · pomodoro #FF4A1C\n   ============================================================ */\n:root{\n  --bone:#E9E5DC;\n  --ink:#0A0A0A;\n  --tomato:#FF4A1C;\n  --sky:#1D6FE0;\n  --green:#1E9E5A;\n  --violet:#7A3FD0;\n  --ease:cubic-bezier(.16,.84,.36,1);\n}\n\n*{ box-sizing:border-box; margin:0; padding:0; }\nhtml,body{ height:100%; }\n\nbody{\n  background:var(--bone);\n  color:var(--ink);\n  font-family:\"IBM Plex Mono\", monospace;\n  font-size:13px;\n  line-height:1.5;\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n  overflow:hidden;\n}\n\n/* utilità tipografiche / motivi */\n.mono-label{\n  font-family:\"IBM Plex Mono\",monospace;\n  text-transform:uppercase;\n  letter-spacing:.2em;\n  font-size:10px;\n  font-weight:500;\n}\n.display{ font-family:\"Bricolage Grotesque\", sans-serif; }\n\n/* rombo a contorno — motivo ricorrente */\n.diamond{\n  display:inline-block; width:9px; height:9px;\n  border:1.5px solid var(--ink);\n  transform:rotate(45deg);\n  vertical-align:middle;\n}\n.diamond.fill{ background:var(--tomato); border-color:var(--tomato); }\n\n/* ============================================================\n   LAYOUT: due colonne, viewport piena\n   ============================================================ */\n.app{\n  display:grid;\n  grid-template-columns: 312px 1fr;\n  height:100vh;\n  width:100vw;\n  background:var(--bone);\n}\n\n/* ============================================================\n   SIDEBAR\n   ============================================================ */\n.sidebar{\n  border-right:2px solid var(--ink);\n  display:flex;\n  flex-direction:column;\n  overflow-y:auto;\n  overflow-x:hidden;\n  /* reticolo di Manhattan a vista nella chrome */\n  background-image:\n    linear-gradient(to right,  rgba(10,10,10,.05) 1px, transparent 1px),\n    linear-gradient(to bottom, rgba(10,10,10,.05) 1px, transparent 1px);\n  background-size:26px 26px;\n}\n.sidebar::-webkit-scrollbar{ width:10px; }\n.sidebar::-webkit-scrollbar-track{ background:var(--bone); border-left:1px solid var(--ink); }\n.sidebar::-webkit-scrollbar-thumb{ background:var(--ink); border:2px solid var(--bone); }\n\n/* 1 — HEADER */\n.sb-header{\n  display:flex; align-items:flex-start; justify-content:space-between;\n  gap:10px;\n  padding:16px 16px 14px;\n  border-bottom:2px solid var(--ink);\n  background:var(--bone);\n}\n.sb-header .title{\n  font-family:\"Bricolage Grotesque\",sans-serif;\n  font-weight:800;\n  font-size:23px;\n  line-height:.96;\n  letter-spacing:-.02em;\n}\n.sb-header .kick{\n  display:flex; align-items:center; gap:8px;\n  margin-bottom:9px;\n}\n.sb-header .kick .tag{\n  background:var(--ink); color:var(--bone);\n  padding:3px 8px; letter-spacing:.18em; font-size:9px; text-transform:uppercase;\n}\n/* chiusura ESC ✕ — glyph geometrico in box */\n.esc-btn{\n  flex:0 0 auto;\n  display:flex; flex-direction:column; align-items:center; gap:3px;\n  border:2px solid var(--ink);\n  background:var(--bone);\n  padding:7px 8px 6px;\n  cursor:pointer;\n  transition:background .16s var(--ease), color .16s var(--ease), transform .16s var(--ease);\n}\n.esc-btn:hover{ background:var(--tomato); transform:translate(-1px,-1px); box-shadow:3px 3px 0 var(--ink); }\n.esc-btn svg{ display:block; }\n.esc-btn .esc-cap{ font-size:8px; letter-spacing:.18em; }\n.esc-btn:hover .esc-cap{ color:var(--bone); }\n.esc-btn:hover line{ stroke:var(--bone); }\n\n/* 2 — TOOLBAR */\n.sb-toolbar{\n  display:grid; grid-template-columns:1fr 1fr;\n  border-bottom:2px solid var(--ink);\n}\n.tb-cell{\n  display:flex; align-items:center; gap:10px;\n  padding:11px 14px;\n  background:var(--bone);\n}\n.tb-cell:first-child{ border-right:1px solid var(--ink); }\n.tb-cell .lab{ font-size:10px; letter-spacing:.16em; text-transform:uppercase; }\n.tb-cell.act{ cursor:pointer; transition:background .16s var(--ease), color .16s var(--ease); }\n.tb-cell.act:hover{ background:var(--ink); color:var(--bone); }\n.tb-cell.act:hover .ico-line{ stroke:var(--bone); }\n/* toggle rettangolare ON */\n.hswitch{\n  width:40px; height:20px;\n  border:2px solid var(--ink);\n  background:var(--tomato);\n  position:relative;\n  flex:0 0 auto;\n}\n.hswitch .knob{\n  position:absolute; top:1px; right:1px;\n  width:14px; height:14px;\n  background:var(--ink);\n}\n.hswitch .on{\n  position:absolute; left:4px; top:50%; transform:translateY(-50%);\n  color:var(--bone); font-size:8px; letter-spacing:.1em; font-weight:600;\n}\n\n/* sezione heading */\n.sb-heading{\n  display:flex; align-items:center; gap:9px;\n  padding:13px 16px 11px;\n  border-bottom:1px solid var(--ink);\n}\n.sb-heading .h{\n  font-family:\"Bricolage Grotesque\",sans-serif;\n  font-weight:700; font-size:14px; letter-spacing:-.01em;\n  text-transform:uppercase;\n}\n.sb-heading .count{ margin-left:auto; }\n.sb-heading .count b{\n  background:var(--ink); color:var(--bone);\n  font-family:\"IBM Plex Mono\",monospace; font-weight:600;\n  padding:2px 7px; font-size:10px; letter-spacing:.08em;\n}\n\n/* 3 — LISTA STRUMENTI */\n.tool-list{ border-bottom:2px solid var(--ink); }\n.tool{\n  display:flex; align-items:center; gap:12px;\n  padding:9px 16px;\n  border-bottom:1px solid rgba(10,10,10,.18);\n  cursor:pointer;\n  background:transparent;\n  transition:background .15s var(--ease), color .15s var(--ease), padding-left .15s var(--ease);\n}\n.tool:last-child{ border-bottom:0; }\n.tool .mk{ flex:0 0 22px; width:22px; height:22px; display:flex; align-items:center; justify-content:center; }\n.tool .nm{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; }\n.tool .kb{\n  margin-left:auto; font-size:9px; letter-spacing:.08em;\n  border:1px solid var(--ink); padding:1px 5px; opacity:.55;\n}\n.tool:hover{ background:var(--ink); color:var(--bone); padding-left:21px; }\n.tool:hover .kb{ border-color:var(--bone); opacity:.85; }\n.tool:hover .mk-stroke{ stroke:var(--bone); }\n\n/* 4 — OGGETTI / card accordion */\n.obj-wrap{ padding:0; }\n.obj-card{\n  border-bottom:2px solid var(--ink);\n  background:var(--bone);\n}\n.obj-head{\n  display:flex; align-items:center; gap:11px;\n  padding:12px 14px;\n  border-bottom:2px solid var(--ink);\n  background:var(--ink);\n  color:var(--bone);\n}\n.obj-head .sw{ width:14px; height:14px; border:1.5px solid var(--bone); transform:rotate(45deg); background:var(--tomato); flex:0 0 auto; }\n.obj-head .nm{ font-family:\"Bricolage Grotesque\",sans-serif; font-weight:700; font-size:15px; letter-spacing:-.01em; }\n.obj-head .chev{ margin-left:auto; }\n.obj-body{ padding:13px 14px 15px; }\n\n.kv{\n  display:flex; justify-content:space-between; align-items:baseline;\n  border:1.5px solid var(--ink);\n  padding:8px 11px; margin-bottom:11px;\n  background:var(--bone);\n}\n.kv .k{ font-size:9px; letter-spacing:.18em; text-transform:uppercase; opacity:.7; }\n.kv .v{ font-size:12px; font-weight:500; }\n\n/* slider statico blocky */\n.slider-block{ margin-bottom:13px; }\n.slider-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px; }\n.slider-top .lab{ font-size:9px; letter-spacing:.18em; text-transform:uppercase; opacity:.7; }\n.slider-top .val{\n  font-family:\"Bricolage Grotesque\",sans-serif; font-weight:800;\n  font-size:18px; line-height:1; letter-spacing:-.02em;\n}\n.slider-track{\n  position:relative; height:14px;\n  border:2px solid var(--ink);\n  background:\n    repeating-linear-gradient(90deg, transparent 0, transparent 11px, rgba(10,10,10,.18) 11px, rgba(10,10,10,.18) 12px);\n}\n.slider-fill{ position:absolute; left:0; top:0; bottom:0; width:62%; background:var(--tomato); }\n.slider-thumb{\n  position:absolute; top:-5px; left:calc(62% - 8px);\n  width:16px; height:22px;\n  background:var(--ink);\n  border:2px solid var(--ink);\n  box-shadow:inset 0 0 0 2px var(--bone);\n}\n\n/* output line */\n.out-line{\n  border:1.5px solid var(--ink);\n  border-left:5px solid var(--tomato);\n  padding:8px 11px; margin-bottom:12px;\n  font-size:12px; letter-spacing:.02em;\n  display:flex; align-items:center; gap:8px; flex-wrap:wrap;\n}\n.out-line b{ font-weight:600; }\n\n/* disclosure regioni */\n.disclosure{\n  display:flex; align-items:center; gap:10px;\n  border:1.5px solid var(--ink);\n  padding:9px 11px; margin-bottom:12px;\n  cursor:pointer; background:var(--bone);\n  transition:background .15s var(--ease), color .15s var(--ease);\n}\n.disclosure:hover{ background:var(--ink); color:var(--bone); }\n.disclosure:hover .ds-line{ stroke:var(--bone); }\n.disclosure .ds-lab{ font-size:10px; letter-spacing:.13em; text-transform:uppercase; }\n.disclosure .ds-plus{ margin-left:auto; }\n\n/* azioni isola / elimina */\n.obj-actions{ display:grid; grid-template-columns:1fr 1fr; gap:0; border:2px solid var(--ink); }\n.act-btn{\n  display:flex; align-items:center; justify-content:center; gap:8px;\n  padding:11px 8px;\n  font-size:10px; letter-spacing:.16em; text-transform:uppercase; font-weight:600;\n  cursor:pointer; background:var(--bone);\n  transition:background .15s var(--ease), color .15s var(--ease), transform .15s var(--ease);\n}\n.act-btn:first-child{ border-right:2px solid var(--ink); }\n.act-btn.isola:hover{ background:var(--ink); color:var(--bone); }\n.act-btn.isola:hover .ab-line{ stroke:var(--bone); }\n.act-btn.elimina:hover{ background:var(--tomato); color:var(--bone); }\n.act-btn.elimina:hover .ab-line{ stroke:var(--bone); }\n\n/* riempitivo in fondo alla sidebar */\n.sb-fill{\n  margin-top:auto;\n  padding:13px 16px;\n  border-top:1px solid var(--ink);\n  display:flex; align-items:center; justify-content:space-between;\n  font-size:9px; letter-spacing:.16em; text-transform:uppercase; opacity:.8;\n}\n\n/* ============================================================\n   AREA CANVAS\n   ============================================================ */\n.canvas-area{\n  position:relative;\n  overflow:hidden;\n  display:flex; flex-direction:column;\n  background:var(--bone);\n}\n.canvas-stage{\n  flex:1;\n  position:relative;\n  overflow:hidden;\n}\n.canvas-stage svg.scene{\n  position:absolute; inset:0;\n  width:100%; height:100%;\n  display:block;\n}\n\n/* etichetta d'angolo \"FIG.\" nello stage */\n.stage-tag{\n  position:absolute; top:14px; left:16px; z-index:4;\n  display:flex; align-items:center; gap:9px;\n  background:var(--ink); color:var(--bone);\n  padding:7px 12px;\n  font-size:10px; letter-spacing:.18em; text-transform:uppercase;\n}\n.stage-tag .diamond{ border-color:var(--tomato); background:var(--tomato); }\n\n/* zoom chrome — angolo in basso a destra dello stage */\n.zoom-chrome{\n  position:absolute; right:16px; bottom:16px; z-index:4;\n  display:flex; flex-direction:column;\n  border:2px solid var(--ink); background:var(--bone);\n}\n.zoom-chrome button{\n  width:36px; height:34px;\n  display:flex; align-items:center; justify-content:center;\n  background:var(--bone); border:0; cursor:pointer;\n  transition:background .14s var(--ease);\n}\n.zoom-chrome button + button{ border-top:1px solid var(--ink); }\n.zoom-chrome button:hover{ background:var(--tomato); }\n.zoom-chrome button:hover .z-line{ stroke:var(--bone); }\n.zoom-pct{\n  border-top:1.5px solid var(--ink);\n  text-align:center; font-size:9px; letter-spacing:.05em; padding:4px 0;\n}\n\n/* ---- EQUATION BOX OVERLAY — sconfina dal frame (brutalist) ---- */\n.eqbox{\n  position:absolute; top:60px; right:-2px; z-index:5;\n  width:330px;\n  border:2px solid var(--ink);\n  background:var(--bone);\n  box-shadow:8px 8px 0 rgba(10,10,10,.16);\n}\n.eqbox .eq-head{\n  display:flex; align-items:center; gap:8px;\n  background:var(--ink); color:var(--bone);\n  padding:7px 12px;\n  font-size:9px; letter-spacing:.2em; text-transform:uppercase;\n}\n.eqbox .eq-head .diamond{ border-color:var(--tomato); background:var(--tomato); width:8px; height:8px; }\n.eqbox .eq-body{ padding:14px 14px 12px; }\n.eqbox .eq-general{\n  font-family:\"Bricolage Grotesque\",sans-serif; font-weight:600;\n  font-size:14px; line-height:1.25; letter-spacing:0;\n  padding-bottom:11px; margin-bottom:11px;\n  border-bottom:1px dashed var(--ink);\n}\n.eqbox .eq-general .op{ color:var(--tomato); }\n.eqbox .eq-instance{\n  display:flex; align-items:center; gap:10px;\n  font-family:\"Bricolage Grotesque\",sans-serif; font-weight:700;\n  font-size:18px; letter-spacing:-.01em;\n}\n.eqbox .eq-instance .arrow{ color:var(--tomato); }\n/* GIGANTE = 8, sconfina dal box in basso a sinistra */\n.eqbox .giant{\n  position:absolute; left:-30px; bottom:-46px;\n  font-family:\"Bricolage Grotesque\",sans-serif; font-weight:800;\n  font-size:128px; line-height:.8; letter-spacing:-.05em;\n  color:var(--tomato);\n  -webkit-text-stroke:2px var(--ink);\n  pointer-events:none;\n  z-index:5;\n}\n.eqbox .giant .twoa{\n  display:block; font-size:11px; letter-spacing:.2em; -webkit-text-stroke:0;\n  color:var(--ink); text-align:center; margin-top:-6px; transform:translateX(4px);\n}\n\n/* ---- STATUS BAR ---- */\n.status-bar{\n  display:flex; align-items:stretch; flex-wrap:wrap;\n  border-top:2px solid var(--ink);\n  background:var(--ink);\n  color:var(--bone);\n}\n.status-bar .seg{\n  display:flex; align-items:center; gap:8px;\n  padding:9px 16px;\n  font-size:11px; letter-spacing:.06em;\n  border-right:1px solid rgba(233,229,220,.25);\n  white-space:nowrap;\n}\n.status-bar .seg .lab{ opacity:.6; font-size:9px; letter-spacing:.16em; text-transform:uppercase; }\n.status-bar .seg b{ font-weight:600; }\n.status-bar .seg.accent b{ color:var(--tomato); }\n.status-bar .snap-pill{\n  margin-left:auto; border-right:0;\n  background:var(--tomato); color:var(--bone); font-weight:600;\n  letter-spacing:.18em;\n}\n\n/* ============================================================\n   SVG SCENE — stili\n   ============================================================ */\n.s-grid line{ stroke:rgba(10,10,10,.14); stroke-width:1; }\n.s-grid line.major{ stroke:rgba(10,10,10,.22); }\n.s-axis{ stroke:var(--ink); stroke-width:2; }\n.s-arrow{ fill:var(--ink); }\n.s-tick{ font-family:\"IBM Plex Mono\",monospace; font-size:11px; fill:var(--ink); }\n.s-crit{ stroke:var(--ink); stroke-width:1.4; stroke-dasharray:5 5; opacity:.65; fill:none; }\n.s-crit-lab{ font-family:\"IBM Plex Mono\",monospace; font-size:10px; fill:var(--ink); opacity:.7; letter-spacing:.04em; }\n.s-octa-fill{ fill:var(--tomato); opacity:.08; }\n.s-octa{ fill:none; stroke:var(--tomato); stroke-width:3.5; stroke-linejoin:miter; }\n.s-focus{ fill:var(--ink); }\n.s-focus-ring{ fill:var(--bone); stroke:var(--ink); stroke-width:2; }\n.s-flabel{ font-family:\"IBM Plex Mono\",monospace; font-size:12px; font-weight:600; fill:var(--ink); }\n.s-path1{ fill:none; stroke:var(--sky); stroke-width:2.6; stroke-linejoin:miter; stroke-linecap:square; }\n.s-path2{ fill:none; stroke:var(--green); stroke-width:2.6; stroke-linejoin:miter; stroke-linecap:square; stroke-dasharray:1 0; }\n.s-pdot{ fill:var(--bone); stroke:var(--ink); stroke-width:2; }\n.s-plabel{ font-family:\"IBM Plex Mono\",monospace; font-size:12px; font-weight:600; fill:var(--ink); }\n.s-center{ fill:var(--ink); }\n\n/* ============================================================\n   ANIMAZIONE D'INGRESSO (unica) — blocchi che scattano in sequenza\n   ============================================================ */\n@keyframes snapIn{\n  0%{ opacity:0; transform:translateY(14px); }\n  60%{ opacity:1; transform:translateY(-3px); }\n  100%{ opacity:1; transform:translateY(0); }\n}\n@keyframes wipeRight{\n  from{ clip-path:inset(0 100% 0 0); }\n  to{   clip-path:inset(0 0 0 0); }\n}\n@keyframes drawIn{\n  from{ stroke-dashoffset:var(--len,1200); }\n  to{   stroke-dashoffset:0; }\n}\n@keyframes popIn{\n  0%{ opacity:0; transform:scale(0); }\n  70%{ opacity:1; transform:scale(1.25); }\n  100%{ opacity:1; transform:scale(1); }\n}\n\n.anim{ opacity:0; animation:snapIn .5s var(--ease) forwards; }\n.sb-header{ animation:wipeRight .5s var(--ease) both; }\n.a1{ animation-delay:.06s; } .a2{ animation-delay:.14s; }\n.a3{ animation-delay:.22s; } .a4{ animation-delay:.30s; }\n.a5{ animation-delay:.38s; } .a6{ animation-delay:.46s; }\n.a7{ animation-delay:.54s; } .a8{ animation-delay:.62s; }\n.a9{ animation-delay:.70s; }\n\n/* scena: octagono e percorsi si disegnano */\n.octa-draw{\n  stroke-dasharray:var(--len,1200); stroke-dashoffset:var(--len,1200);\n  animation:drawIn 1s var(--ease) .75s forwards;\n}\n.path-draw{\n  stroke-dasharray:var(--len,600); stroke-dashoffset:var(--len,600);\n  animation:drawIn .7s var(--ease) 1.5s forwards;\n}\n.pop{ transform-box:fill-box; transform-origin:center; opacity:0; animation:popIn .4s var(--ease) forwards; }\n.pop.pp1{ animation-delay:1.85s; }\n.pop.pp2{ animation-delay:1.95s; }\n.pop.pp3{ animation-delay:2.1s; }\n\n@media (prefers-reduced-motion: reduce){\n  .anim,.sb-header,.octa-draw,.path-draw,.pop{\n    animation:none !important; opacity:1 !important; clip-path:none !important;\n    transform:none !important; stroke-dashoffset:0 !important;\n  }\n}\n\n/* ============================================================\n   RESPONSIVE (mantiene la struttura; il mockup è desktop-first)\n   ============================================================ */\n@media (max-width:880px){\n  .app{ grid-template-columns:1fr; grid-template-rows:auto 1fr; }\n  .sidebar{ border-right:0; border-bottom:2px solid var(--ink); max-height:46vh; }\n  .eqbox{ width:270px; }\n  .eqbox .giant{ font-size:92px; }\n}\n</style>\n</head>\n<body>\n\n<main class=\"app\">\n\n  <!-- ===================== SIDEBAR ===================== -->\n  <aside class=\"sidebar\">\n\n    <!-- 1 · HEADER -->\n    <div class=\"sb-header\">\n      <div>\n        <div class=\"kick\">\n          <span class=\"tag\">Metrica&nbsp;L₁</span>\n        </div>\n        <h1 class=\"title\">Calcolatore<br>Grafico</h1>\n      </div>\n      <button class=\"esc-btn\" type=\"button\" aria-label=\"Chiudi (ESC)\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" aria-hidden=\"true\">\n          <rect x=\"1.5\" y=\"1.5\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"#0A0A0A\" stroke-width=\"2\"/>\n          <line x1=\"6\" y1=\"6\" x2=\"14\" y2=\"14\" stroke=\"#0A0A0A\" stroke-width=\"2.4\"/>\n          <line x1=\"14\" y1=\"6\" x2=\"6\" y2=\"14\" stroke=\"#0A0A0A\" stroke-width=\"2.4\"/>\n        </svg>\n        <span class=\"esc-cap mono-label\">ESC</span>\n      </button>\n    </div>\n\n    <!-- 2 · TOOLBAR -->\n    <div class=\"sb-toolbar anim a1\">\n      <div class=\"tb-cell\">\n        <span class=\"hswitch\" role=\"img\" aria-label=\"Snap attivo\">\n          <span class=\"on\">ON</span>\n          <span class=\"knob\"></span>\n        </span>\n        <span class=\"lab\">Snap</span>\n      </div>\n      <div class=\"tb-cell act\" role=\"button\" tabindex=\"0\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" aria-hidden=\"true\">\n          <path class=\"ico-line\" d=\"M3 5h12M6.5 5V3.5h5V5M5 5l1 11h6l1-11\" fill=\"none\" stroke=\"#0A0A0A\" stroke-width=\"1.7\" stroke-linejoin=\"miter\"/>\n        </svg>\n        <span class=\"lab\">Svuota</span>\n      </div>\n    </div>\n\n    <!-- 3 · CREA OGGETTO -->\n    <div class=\"sb-heading anim a2\">\n      <span class=\"diamond\" aria-hidden=\"true\"></span>\n      <span class=\"h\">Crea oggetto</span>\n    </div>\n\n    <div class=\"tool-list anim a3\">\n      <!-- Asse — bisettrice perpendicolare -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <span class=\"mk\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n            <circle cx=\"5\" cy=\"16\" r=\"2.2\" fill=\"#FF4A1C\"/>\n            <circle cx=\"17\" cy=\"6\" r=\"2.2\" fill=\"#FF4A1C\"/>\n            <line class=\"mk-stroke\" x1=\"5\" y1=\"16\" x2=\"17\" y2=\"6\" stroke=\"#0A0A0A\" stroke-width=\"1.3\" stroke-dasharray=\"2 2\"/>\n            <line class=\"mk-stroke\" x1=\"3\" y1=\"5\" x2=\"19\" y2=\"17\" stroke=\"#0A0A0A\" stroke-width=\"2\"/>\n          </svg>\n        </span>\n        <span class=\"nm\">Asse</span><span class=\"kb\">A</span>\n      </div>\n      <!-- Circonferenza — rombo taxicab -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <span class=\"mk\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n            <polygon class=\"mk-stroke\" points=\"11,3 19,11 11,19 3,11\" fill=\"none\" stroke=\"#1D6FE0\" stroke-width=\"2\" stroke-linejoin=\"miter\"/>\n          </svg>\n        </span>\n        <span class=\"nm\">Circonferenza</span><span class=\"kb\">C</span>\n      </div>\n      <!-- Ellisse — ottagono -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <span class=\"mk\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n            <polygon class=\"mk-stroke\" points=\"8,3 14,3 19,8 19,14 14,19 8,19 3,14 3,8\" fill=\"none\" stroke=\"#FF4A1C\" stroke-width=\"2\" stroke-linejoin=\"miter\"/>\n          </svg>\n        </span>\n        <span class=\"nm\">Ellisse</span><span class=\"kb\">E</span>\n      </div>\n      <!-- Iperbole — due archi opposti -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <span class=\"mk\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n            <path class=\"mk-stroke\" d=\"M8 3 Q3 11 8 19\" fill=\"none\" stroke=\"#1E9E5A\" stroke-width=\"2\"/>\n            <path class=\"mk-stroke\" d=\"M14 3 Q19 11 14 19\" fill=\"none\" stroke=\"#1E9E5A\" stroke-width=\"2\"/>\n          </svg>\n        </span>\n        <span class=\"nm\">Iperbole</span><span class=\"kb\">I</span>\n      </div>\n      <!-- Parabola — curva aperta -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <span class=\"mk\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n            <path class=\"mk-stroke\" d=\"M3 4 Q11 22 19 4\" fill=\"none\" stroke=\"#7A3FD0\" stroke-width=\"2\"/>\n          </svg>\n        </span>\n        <span class=\"nm\">Parabola</span><span class=\"kb\">P</span>\n      </div>\n      <!-- Luogo — locus a punti -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <span class=\"mk\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n            <g fill=\"#0A0A0A\" class=\"mk-stroke\" stroke=\"none\">\n              <circle cx=\"4\" cy=\"14\" r=\"1.5\"/><circle cx=\"8\" cy=\"9\" r=\"1.5\"/>\n              <circle cx=\"11\" cy=\"6\" r=\"1.5\"/><circle cx=\"14\" cy=\"9\" r=\"1.5\"/>\n              <circle cx=\"18\" cy=\"14\" r=\"1.5\"/>\n            </g>\n          </svg>\n        </span>\n        <span class=\"nm\">Luogo</span><span class=\"kb\">L</span>\n      </div>\n      <!-- Distanza — segmento con tacche -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <span class=\"mk\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" aria-hidden=\"true\">\n            <line class=\"mk-stroke\" x1=\"4\" y1=\"11\" x2=\"18\" y2=\"11\" stroke=\"#0A0A0A\" stroke-width=\"2\"/>\n            <line class=\"mk-stroke\" x1=\"4\" y1=\"6\" x2=\"4\" y2=\"16\" stroke=\"#0A0A0A\" stroke-width=\"2\"/>\n            <line class=\"mk-stroke\" x1=\"18\" y1=\"6\" x2=\"18\" y2=\"16\" stroke=\"#0A0A0A\" stroke-width=\"2\"/>\n          </svg>\n        </span>\n        <span class=\"nm\">Distanza</span><span class=\"kb\">D</span>\n      </div>\n    </div>\n\n    <!-- 4 · OGGETTI -->\n    <div class=\"sb-heading anim a4\">\n      <span class=\"diamond fill\" aria-hidden=\"true\"></span>\n      <span class=\"h\">Oggetti</span>\n      <span class=\"count\"><b>1</b></span>\n    </div>\n\n    <div class=\"obj-wrap anim a5\">\n      <div class=\"obj-card\">\n        <div class=\"obj-head\">\n          <span class=\"sw\" aria-hidden=\"true\"></span>\n          <span class=\"nm\">Ellisse #1</span>\n          <span class=\"chev\" aria-hidden=\"true\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\"><path d=\"M3 5l4 4 4-4\" fill=\"none\" stroke=\"#E9E5DC\" stroke-width=\"2\"/></svg>\n          </span>\n        </div>\n        <div class=\"obj-body\">\n\n          <div class=\"kv\">\n            <span class=\"k\">F₁</span>\n            <span class=\"v\">(−2, −1)</span>\n          </div>\n          <div class=\"kv\">\n            <span class=\"k\">F₂</span>\n            <span class=\"v\">(2, 1)</span>\n          </div>\n\n          <div class=\"slider-block\">\n            <div class=\"slider-top\">\n              <span class=\"lab\">Somma · S</span>\n              <span class=\"val\">8</span>\n            </div>\n            <div class=\"slider-track\" role=\"img\" aria-label=\"Slider S uguale 8\">\n              <span class=\"slider-fill\"></span>\n              <span class=\"slider-thumb\"></span>\n            </div>\n          </div>\n\n          <div class=\"out-line\">\n            <span>d₀ = <b>6.00</b></span>\n            <span class=\"diamond\" aria-hidden=\"true\" style=\"width:6px;height:6px;\"></span>\n            <span>k = <b>1.00</b></span>\n          </div>\n\n          <div class=\"disclosure\" role=\"button\" tabindex=\"0\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" aria-hidden=\"true\">\n              <rect class=\"ds-line\" x=\"1.5\" y=\"1.5\" width=\"11\" height=\"11\" fill=\"none\" stroke=\"#0A0A0A\" stroke-width=\"1.6\"/>\n              <line class=\"ds-line\" x1=\"4\" y1=\"7\" x2=\"10\" y2=\"7\" stroke=\"#0A0A0A\" stroke-width=\"1.6\"/>\n              <line class=\"ds-line\" x1=\"7\" y1=\"4\" x2=\"7\" y2=\"10\" stroke=\"#0A0A0A\" stroke-width=\"1.6\"/>\n            </svg>\n            <span class=\"ds-lab\">Analisi regioni e equazioni</span>\n            <span class=\"ds-plus\" aria-hidden=\"true\">\n              <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\"><path d=\"M2 4l4 4 4-4\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"/></svg>\n            </span>\n          </div>\n\n          <div class=\"obj-actions\">\n            <div class=\"act-btn isola\" role=\"button\" tabindex=\"0\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 15 15\" aria-hidden=\"true\">\n                <circle class=\"ab-line\" cx=\"7.5\" cy=\"7.5\" r=\"5.5\" fill=\"none\" stroke=\"#0A0A0A\" stroke-width=\"1.7\"/>\n                <circle cx=\"7.5\" cy=\"7.5\" r=\"2\" fill=\"#FF4A1C\"/>\n              </svg>\n              Isola\n            </div>\n            <div class=\"act-btn elimina\" role=\"button\" tabindex=\"0\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 15 15\" aria-hidden=\"true\">\n                <path class=\"ab-line\" d=\"M3 4h9M5.5 4V2.5h4V4M4.5 4l.7 8.5h4.6L10.5 4\" fill=\"none\" stroke=\"#0A0A0A\" stroke-width=\"1.5\" stroke-linejoin=\"miter\"/>\n              </svg>\n              Elimina\n            </div>\n          </div>\n\n        </div>\n      </div>\n    </div>\n\n    <div class=\"sb-fill anim a6\">\n      <span>Geometria del Taxi</span>\n      <span style=\"display:flex;align-items:center;gap:7px;\"><span class=\"diamond\" aria-hidden=\"true\"></span> Brutalista</span>\n    </div>\n\n  </aside>\n\n  <!-- ===================== AREA CANVAS ===================== -->\n  <section class=\"canvas-area\">\n\n    <div class=\"canvas-stage\">\n\n      <!-- etichetta angolo -->\n      <div class=\"stage-tag anim a3\">\n        <span class=\"diamond\" aria-hidden=\"true\"></span>\n        FIG. 03 · ELLISSE L₁ · 2a = 8\n      </div>\n\n      <!-- SCENA SVG\n           World→pixel: px_x = 360 + 36·wx ; px_y = 280 − 36·wy\n           viewBox 0 0 720 560, origine pixel (360,280), scala 36px/unità -->\n      <svg class=\"scene\" viewBox=\"0 0 720 560\" preserveAspectRatio=\"xMidYMid meet\"\n           role=\"img\"\n           aria-label=\"Scena taxicab: ellisse L₁ a otto lati con fuochi F₁(−2,−1) e F₂(2,1), somma 2a uguale 8, su griglia di Manhattan; punto P sul bordo con due cammini a gradini verso i fuochi.\">\n\n        <!-- griglia di Manhattan -->\n        <g class=\"s-grid\">\n          <!-- verticali ogni 36px da 0 a 720, allineate all'origine 360 -->\n          <line x1=\"0\"   y1=\"0\" x2=\"0\"   y2=\"560\"/>\n          <line x1=\"36\"  y1=\"0\" x2=\"36\"  y2=\"560\"/>\n          <line x1=\"72\"  y1=\"0\" x2=\"72\"  y2=\"560\"/>\n          <line x1=\"108\" y1=\"0\" x2=\"108\" y2=\"560\"/>\n          <line x1=\"144\" y1=\"0\" x2=\"144\" y2=\"560\"/>\n          <line x1=\"180\" y1=\"0\" x2=\"180\" y2=\"560\"/>\n          <line x1=\"216\" y1=\"0\" x2=\"216\" y2=\"560\"/>\n          <line x1=\"252\" y1=\"0\" x2=\"252\" y2=\"560\"/>\n          <line x1=\"288\" y1=\"0\" x2=\"288\" y2=\"560\"/>\n          <line x1=\"324\" y1=\"0\" x2=\"324\" y2=\"560\"/>\n          <line x1=\"396\" y1=\"0\" x2=\"396\" y2=\"560\"/>\n          <line x1=\"432\" y1=\"0\" x2=\"432\" y2=\"560\"/>\n          <line x1=\"468\" y1=\"0\" x2=\"468\" y2=\"560\"/>\n          <line x1=\"504\" y1=\"0\" x2=\"504\" y2=\"560\"/>\n          <line x1=\"540\" y1=\"0\" x2=\"540\" y2=\"560\"/>\n          <line x1=\"576\" y1=\"0\" x2=\"576\" y2=\"560\"/>\n          <line x1=\"612\" y1=\"0\" x2=\"612\" y2=\"560\"/>\n          <line x1=\"648\" y1=\"0\" x2=\"648\" y2=\"560\"/>\n          <line x1=\"684\" y1=\"0\" x2=\"684\" y2=\"560\"/>\n          <line x1=\"720\" y1=\"0\" x2=\"720\" y2=\"560\"/>\n          <!-- orizzontali ogni 36px da 0 a 560, allineate all'origine 280 -->\n          <line x1=\"0\" y1=\"28\"  x2=\"720\" y2=\"28\"/>\n          <line x1=\"0\" y1=\"64\"  x2=\"720\" y2=\"64\"/>\n          <line x1=\"0\" y1=\"100\" x2=\"720\" y2=\"100\"/>\n          <line x1=\"0\" y1=\"136\" x2=\"720\" y2=\"136\"/>\n          <line x1=\"0\" y1=\"172\" x2=\"720\" y2=\"172\"/>\n          <line x1=\"0\" y1=\"208\" x2=\"720\" y2=\"208\"/>\n          <line x1=\"0\" y1=\"244\" x2=\"720\" y2=\"244\"/>\n          <line x1=\"0\" y1=\"316\" x2=\"720\" y2=\"316\"/>\n          <line x1=\"0\" y1=\"352\" x2=\"720\" y2=\"352\"/>\n          <line x1=\"0\" y1=\"388\" x2=\"720\" y2=\"388\"/>\n          <line x1=\"0\" y1=\"424\" x2=\"720\" y2=\"424\"/>\n          <line x1=\"0\" y1=\"460\" x2=\"720\" y2=\"460\"/>\n          <line x1=\"0\" y1=\"496\" x2=\"720\" y2=\"496\"/>\n          <line x1=\"0\" y1=\"532\" x2=\"720\" y2=\"532\"/>\n        </g>\n\n        <!-- ASSI attraverso il centro (origine pixel 360,280) -->\n        <line class=\"s-axis\" x1=\"8\" y1=\"280\" x2=\"712\" y2=\"280\"/>\n        <line class=\"s-axis\" x1=\"360\" y1=\"12\" x2=\"360\" y2=\"548\"/>\n        <!-- frecce -->\n        <polygon class=\"s-arrow\" points=\"712,280 702,275 702,285\"/>\n        <polygon class=\"s-arrow\" points=\"360,12 355,22 365,22\"/>\n        <text class=\"s-tick\" x=\"700\" y=\"298\">x</text>\n        <text class=\"s-tick\" x=\"368\" y=\"22\">y</text>\n\n        <!-- numeri assi (x: −4..4 ; y: −3..3) -->\n        <!-- x -->\n        <text class=\"s-tick\" x=\"213\" y=\"298\" text-anchor=\"middle\">−4</text>\n        <text class=\"s-tick\" x=\"285\" y=\"298\" text-anchor=
