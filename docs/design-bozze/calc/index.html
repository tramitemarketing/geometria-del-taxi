: var(--cream); }\n  .kv .v .amb { color: var(--amber); }\n\n  /* slider (statico) */\n  .slider-row { margin: 12px 0 6px; }\n  .slider-row .slab {\n    display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 7px;\n  }\n  .slider-row .slab .name { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.1em; color: var(--sepia); text-transform: uppercase; }\n  .slider-row .slab .num  { font-family: var(--mono); font-size: 0.82rem; color: var(--amber); }\n  .track {\n    position: relative; height: 4px; background: var(--ink); border: 1px solid var(--hair-2);\n  }\n  .track .fill { position: absolute; left: 0; top: -1px; bottom: -1px; width: 56%; background: var(--amber-soft); opacity: 0.85; }\n  .track .thumb {\n    position: absolute; top: 50%; left: 56%;\n    width: 13px; height: 13px; transform: translate(-50%,-50%) rotate(45deg);\n    background: var(--amber); border: 1px solid var(--ink);\n  }\n  /* tacche quota sotto lo slider */\n  .ticks { display: flex; justify-content: space-between; margin-top: 6px; }\n  .ticks span { font-family: var(--mono); font-size: 0.56rem; color: var(--sepia-dim); }\n\n  .out {\n    margin: 12px 0 4px;\n    padding: 9px 11px;\n    background: var(--ink);\n    border: 1px solid var(--hair);\n    border-left: 2px solid var(--amber);\n    font-family: var(--mono); font-size: 0.78rem; color: var(--cream);\n    letter-spacing: 0.02em;\n  }\n  .out .amb { color: var(--amber); }\n\n  .analisi {\n    display: flex; align-items: center; gap: 8px;\n    margin: 12px 0 2px;\n    padding: 8px 10px;\n    border: 1px dashed var(--hair-2);\n    color: var(--sepia);\n    cursor: pointer;\n    transition: border-color .2s ease, color .2s ease, background .2s ease;\n  }\n  .analisi:hover { border-color: var(--amber-soft); color: var(--amber); background: rgba(224,165,46,0.05); }\n  .analisi .t { font-family: var(--body); font-size: 0.96rem; }\n  .analisi .plus { margin-left: auto; color: var(--sepia-dim); }\n\n  .actions { display: flex; gap: 8px; margin-top: 12px; }\n  .actions button {\n    flex: 1 1 auto;\n    display: inline-flex; align-items: center; justify-content: center; gap: 7px;\n    padding: 8px 10px;\n    background: transparent;\n    border: 1px solid var(--hair-2);\n    color: var(--sepia);\n    font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;\n    cursor: pointer;\n    transition: border-color .2s ease, color .2s ease, background .2s ease;\n  }\n  .actions button:hover { border-color: var(--amber-soft); color: var(--amber); background: rgba(224,165,46,0.05); }\n  .actions button.danger:hover { border-color: #C8563B; color: #E5876C; background: rgba(200,86,59,0.06); }\n\n  .sb-spacer { flex: 1 1 auto; min-height: 14px; }\n  .sb-foot {\n    border-top: 1px solid var(--hair-2);\n    padding: 11px 16px 14px;\n    display: flex; align-items: center; justify-content: space-between;\n    color: var(--sepia-dim);\n  }\n\n  /* =========================================================\n     AREA CANVAS — foglio tecnico\n     ========================================================= */\n  .stage {\n    position: relative;\n    overflow: hidden;\n    background:\n      radial-gradient(circle at 26% 16%, rgba(224,165,46,0.05), transparent 46%),\n      radial-gradient(circle at 84% 88%, rgba(185,167,126,0.045), transparent 50%),\n      var(--ink);\n  }\n  /* cornice foglio + crocette di registro sull'area disegno */\n  .sheet-frame {\n    position: absolute; inset: 14px;\n    border: 1px solid var(--hair-2);\n    pointer-events: none; z-index: 3;\n  }\n  .reg { position: absolute; width: 16px; height: 16px; }\n  .reg::before, .reg::after { content: \"\"; position: absolute; background: var(--amber-soft); }\n  .reg::before { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-0.5px); }\n  .reg::after  { top: 50%; left: 0; height: 1px; width: 100%; transform: translateY(-0.5px); }\n  .reg.tl { top: 6px; left: 6px; }  .reg.tr { top: 6px; right: 6px; }\n  .reg.bl { bottom: 6px; left: 6px; } .reg.br { bottom: 6px; right: 6px; }\n\n  .sheet { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }\n\n  /* overlay equazioni */\n  .eqbox {\n    position: absolute; top: 30px; left: 30px;\n    z-index: 4;\n    background: rgba(22,20,15,0.86);\n    border: 1px solid var(--hair-2);\n    border-left: 3px solid var(--amber);\n    padding: 12px 16px 13px;\n    max-width: 340px;\n    backdrop-filter: blur(2px);\n  }\n  .eqbox .tag {\n    position: absolute; top: -8px; right: 12px;\n    background: var(--ink); padding: 0 7px;\n    font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.22em; color: var(--sepia-dim);\n  }\n  .eqbox .lab { margin-bottom: 8px; }\n  .eqbox .eq { font-family: var(--mono); font-size: 0.86rem; color: var(--cream); line-height: 1.85; }\n  .eqbox .eq .amb { color: var(--amber); }\n  .eqbox .eq .arr { color: var(--sepia); }\n  .eqbox .eq .res { color: var(--amber); font-weight: 500; }\n\n  /* status bar */\n  .statusbar {\n    position: absolute; left: 14px; right: 14px; bottom: 14px;\n    z-index: 4;\n    height: 30px;\n    display: flex; align-items: center; gap: 0;\n    background: rgba(22,20,15,0.9);\n    border-top: 1px solid var(--hair-2);\n    font-family: var(--mono); font-size: 0.68rem; color: var(--sepia);\n    letter-spacing: 0.04em;\n    overflow: hidden; white-space: nowrap;\n  }\n  .statusbar .seg { padding: 0 14px; border-left: 1px solid var(--hair); height: 100%; display: flex; align-items: center; gap: 6px; }\n  .statusbar .seg:first-child { border-left: none; }\n  .statusbar .seg .amb { color: var(--amber); }\n  .statusbar .seg .on { color: var(--amber); }\n  .statusbar .grow { flex: 1 1 auto; }\n\n  /* hint zoom in alto a destra */\n  .zoomhint {\n    position: absolute; top: 30px; right: 30px; z-index: 4;\n    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;\n    text-align: right;\n  }\n  .zoomhint .lvl { font-family: var(--mono); font-size: 0.82rem; color: var(--amber); }\n  .zoomhint .sub { color: var(--sepia-dim); }\n\n  /* =========================================================\n     ANIMAZIONE D'INGRESSO — un unico reveal scaglionato\n     costruzione (griglia/assi/quote) -> poi la curva\n     ========================================================= */\n  @keyframes draw  { to { stroke-dashoffset: 0; } }\n  @keyframes appear { to { opacity: 1; } }\n  @keyframes riseUI { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }\n\n  /* tratti che si disegnano (lunghezza impostata via JS, fallback CSS) */\n  .draw {\n    stroke-dasharray: var(--len, 900);\n    stroke-dashoffset: var(--len, 900);\n    animation: draw 1.5s ease forwards;\n    animation-delay: var(--d, 0s);\n  }\n  .soft { opacity: 0; animation: appear .7s ease forwards; animation-delay: var(--d, 0s); }\n\n  /* pannelli UI che salgono in sequenza */\n  .ui-rise { opacity: 0; animation: riseUI .7s cubic-bezier(.2,.7,.2,1) forwards; }\n  .u1 { animation-delay: .05s; } .u2 { animation-delay: .18s; }\n  .u3 { animation-delay: .30s; } .u4 { animation-delay: .42s; }\n  .u5 { animation-delay: .54s; } .u6 { animation-delay: .66s; }\n\n  @media (prefers-reduced-motion: reduce) {\n    .draw, .soft, .ui-rise {\n      animation: none !important;\n      opacity: 1 !important;\n      stroke-dashoffset: 0 !important;\n      transform: none !important;\n    }\n  }\n\n  /* =========================================================\n     RESPONSIVE (degrada con grazia su schermi stretti)\n     ========================================================= */\n  @media (max-width: 760px) {\n    .app { grid-template-columns: 1fr; grid-template-rows: 46vh 54vh; }\n    .sidebar { border-right: none; border-bottom: 1px solid var(--hair-2); }\n    .eqbox { max-width: 240px; top: 24px; left: 24px; padding: 9px 12px; }\n    .eqbox .eq { font-size: 0.74rem; }\n    .zoomhint { top: 24px; right: 24px; }\n  }\n</style>\n</head>\n<body>\n\n  <div class=\"app\">\n\n    <!-- =========================== SIDEBAR =========================== -->\n    <aside class=\"sidebar\">\n\n      <!-- HEADER -->\n      <div class=\"sb-header ui-rise u1\">\n        <div>\n          <div class=\"ttl\">Calcolatore<br/>Grafico</div>\n          <div class=\"sub tech\">Metrica L₁ · Tavola interattiva</div>\n        </div>\n        <div class=\"esc\" role=\"button\" aria-label=\"Chiudi (Esc)\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" aria-hidden=\"true\">\n            <path d=\"M2 2 L12 12 M12 2 L2 12\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\"/>\n          </svg>\n          <span class=\"lab\">ESC</span>\n        </div>\n      </div>\n\n      <!-- TOOLBAR -->\n      <div class=\"sb-toolbar ui-rise u2\">\n        <div class=\"snap\" role=\"switch\" aria-checked=\"true\">\n          <span class=\"lab\">Snap</span>\n          <!-- toggle disegnato come geometria (ON) -->\n          <svg class=\"switch\" width=\"40\" height=\"20\" viewBox=\"0 0 40 20\" aria-hidden=\"true\">\n            <rect x=\"0.5\" y=\"0.5\" width=\"39\" height=\"19\" fill=\"rgba(224,165,46,0.14)\" stroke=\"var(--amber-soft)\"/>\n            <!-- tacche griglia interne -->\n            <path d=\"M10 1 V19 M20 1 V19 M30 1 V19\" stroke=\"var(--hair-2)\" stroke-width=\"0.7\"/>\n            <!-- thumb (rombo, posizione ON a destra) -->\n            <rect x=\"24\" y=\"3.5\" width=\"13\" height=\"13\" transform=\"rotate(45 30.5 10)\" fill=\"var(--amber)\" stroke=\"var(--ink)\" stroke-width=\"0.8\"/>\n          </svg>\n        </div>\n        <div class=\"svuota\" role=\"button\">\n          <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" aria-hidden=\"true\">\n            <path d=\"M2 3.5 H12 M5.5 3.5 V2 H8.5 V3.5 M3.5 3.5 L4.2 12 H9.8 L10.5 3.5\" stroke=\"currentColor\" stroke-width=\"1.1\" fill=\"none\" stroke-linejoin=\"round\"/>\n          </svg>\n          Svuota\n        </div>\n      </div>\n\n      <!-- CREA OGGETTO -->\n      <div class=\"sb-section ui-rise u3\">\n        <div class=\"head\">\n          <span class=\"h\">Crea oggetto</span>\n          <span class=\"tech\">7 tipi</span>\n        </div>\n        <div class=\"tools\">\n\n          <!-- ASSE -->\n          <div class=\"tool\" role=\"button\">\n            <span class=\"ic\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n                <circle cx=\"6\" cy=\"17\" r=\"2\" fill=\"none\" stroke=\"#B9A77E\" stroke-width=\"1.3\"/>\n                <circle cx=\"18\" cy=\"7\" r=\"2\" fill=\"none\" stroke=\"#B9A77E\" stroke-width=\"1.3\"/>\n                <path d=\"M2 9 L22 15\" stroke=\"#C9923B\" stroke-width=\"1.4\" stroke-dasharray=\"3 3\"/>\n              </svg>\n            </span>\n            <span class=\"nm\">Asse</span><span class=\"key\">A</span>\n          </div>\n\n          <!-- CIRCONFERENZA (rombo taxicab) -->\n          <div class=\"tool\" role=\"button\">\n            <span class=\"ic\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n                <path d=\"M12 3 L21 12 L12 21 L3 12 Z\" fill=\"rgba(224,165,46,0.10)\" stroke=\"#E0A52E\" stroke-width=\"1.4\"/>\n                <circle cx=\"12\" cy=\"12\" r=\"1.2\" fill=\"#E0A52E\"/>\n              </svg>\n            </span>\n            <span class=\"nm\">Circonferenza</span><span class=\"key\">C</span>\n          </div>\n\n          <!-- ELLISSE (ottagono) -->\n          <div class=\"tool\" role=\"button\">\n            <span class=\"ic\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n                <path d=\"M8 3 L16 3 L21 8 L21 16 L16 21 L8 21 L3 16 L3 8 Z\" fill=\"rgba(224,165,46,0.07)\" stroke=\"#C7A24E\" stroke-width=\"1.3\"/>\n              </svg>\n            </span>\n            <span class=\"nm\">Ellisse</span><span class=\"key\">E</span>\n          </div>\n\n          <!-- IPERBOLE (due archi) -->\n          <div class=\"tool\" role=\"button\">\n            <span class=\"ic\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n                <path d=\"M9 3 L5 12 L9 21\" fill=\"none\" stroke=\"#C98B6B\" stroke-width=\"1.4\"/>\n                <path d=\"M15 3 L19 12 L15 21\" fill=\"none\" stroke=\"#C98B6B\" stroke-width=\"1.4\"/>\n              </svg>\n            </span>\n            <span class=\"nm\">Iperbole</span><span class=\"key\">I</span>\n          </div>\n\n          <!-- PARABOLA (curva aperta) -->\n          <div class=\"tool\" role=\"button\">\n            <span class=\"ic\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n                <path d=\"M3 4 L10 4 L14 12 L10 20 L3 20\" fill=\"none\" stroke=\"#C7A24E\" stroke-width=\"1.4\" stroke-linejoin=\"round\"/>\n              </svg>\n            </span>\n            <span class=\"nm\">Parabola</span><span class=\"key\">P</span>\n          </div>\n\n          <!-- LUOGO (punteggiato) -->\n          <div class=\"tool\" role=\"button\">\n            <span class=\"ic\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n                <g fill=\"#B9A77E\">\n                  <circle cx=\"5\" cy=\"13\" r=\"1.4\"/><circle cx=\"9\" cy=\"8\" r=\"1.4\"/>\n                  <circle cx=\"13\" cy=\"6\" r=\"1.4\"/><circle cx=\"17\" cy=\"9\" r=\"1.4\"/>\n                  <circle cx=\"20\" cy=\"15\" r=\"1.4\"/><circle cx=\"13\" cy=\"18\" r=\"1.4\"/>\n                </g>\n              </svg>\n            </span>\n            <span class=\"nm\">Luogo</span><span class=\"key\">L</span>\n          </div>\n\n          <!-- DISTANZA (segmento con tacche) -->\n          <div class=\"tool\" role=\"button\">\n            <span class=\"ic\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n                <path d=\"M4 12 H20\" stroke=\"#D8CBA8\" stroke-width=\"1.4\"/>\n                <path d=\"M4 8 V16 M20 8 V16\" stroke=\"#D8CBA8\" stroke-width=\"1.4\"/>\n              </svg>\n            </span>\n            <span class=\"nm\">Distanza</span><span class=\"key\">D</span>\n          </div>\n\n        </div>\n      </div>\n\n      <!-- OGGETTI -->\n      <div class=\"sb-section ui-rise u4\">\n        <div class=\"head\">\n          <span class=\"h\">Oggetti</span>\n          <span class=\"tech\">(1)</span>\n        </div>\n\n        <!-- CARD: Ellisse #1 (espansa) -->\n        <div class=\"card\">\n          <div class=\"card-head\">\n            <span class=\"ic\">\n              <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n                <path d=\"M8 3 L16 3 L21 8 L21 16 L16 21 L8 21 L3 16 L3 8 Z\" fill=\"rgba(224,165,46,0.12)\" stroke=\"#E0A52E\" stroke-width=\"1.4\"/>\n              </svg>\n            </span>\n            <span class=\"nm\">Ellisse #1</span>\n            <span class=\"chev\" aria-hidden=\"true\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\"><path d=\"M3 9 L7 5 L11 9\" stroke=\"currentColor\" stroke-width=\"1.3\" fill=\"none\"/></svg>\n            </span>\n          </div>\n          <div class=\"card-body\">\n\n            <div class=\"kv\">\n              <span class=\"k\">Fuoco F₁</span>\n              <span class=\"v\">(<span class=\"amb\">−2</span>, <span class=\"amb\">−1</span>)</span>\n            </div>\n            <div class=\"kv\">\n              <span class=\"k\">Fuoco F₂</span>\n              <span class=\"v\">(<span class=\"amb\">2</span>, <span class=\"amb\">1</span>)</span>\n            </div>\n\n            <div class=\"slider-row\">\n              <div class=\"slab\">\n                <span class=\"name\">Somma S = 2a</span>\n                <span class=\"num\">S = 8</span>\n              </div>\n              <div class=\"track\" role=\"slider\" aria-valuemin=\"6\" aria-valuemax=\"12\" aria-valuenow=\"8\">\n                <span class=\"fill\"></span><span class=\"thumb\"></span>\n              </div>\n              <div class=\"ticks\"><span>6</span><span>8</span><span>10</span><span>12</span></div>\n            </div>\n\n            <div class=\"out\">d₀ = <span class=\"amb\">6.00</span> · k = <span class=\"amb\">1.00</span></div>\n\n            <div class=\"analisi\" role=\"button\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" aria-hidden=\"true\">\n                <rect x=\"1.5\" y=\"1.5\" width=\"13\" height=\"13\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\"/>\n                <path d=\"M5.5 1.5 V14.5 M1.5 8 H14.5\" stroke=\"currentColor\" stroke-width=\"0.8\" stroke-dasharray=\"2 2\"/>\n              </svg>\n              <span class=\"t\">Analisi regioni e equazioni</span>\n              <span class=\"plus\">\n                <svg width=\"13\" height=\"13\" viewBox=\"0 0 13 13\"><path d=\"M6.5 2 V11 M2 6.5 H11\" stroke=\"currentColor\" stroke-width=\"1.2\"/></svg>\n              </span>\n            </div>\n\n            <div class=\"actions\">\n              <button>\n                <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" aria-hidden=\"true\">\n                  <circle cx=\"7\" cy=\"7\" r=\"3\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\"/>\n                  <path d=\"M7 1 V3 M7 11 V13 M1 7 H3 M11 7 H13\" stroke=\"currentColor\" stroke-width=\"1.2\"/>\n                </svg>\n                Isola\n              </button>\n              <button class=\"danger\">\n                <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" aria-hidden=\"true\">\n                  <path d=\"M2 3.5 H12 M5.5 3.5 V2 H8.5 V3.5 M3.5 3.5 L4.2 12 H9.8 L10.5 3.5\" stroke=\"currentColor\" stroke-width=\"1.1\" fill=\"none\" stroke-linejoin=\"round\"/>\n                </svg>\n                Elimina\n              </button>\n            </div>\n\n          </div>\n        </div>\n      </div>\n\n      <div class=\"sb-spacer ui-rise u5\"></div>\n\n      <div class=\"sb-foot ui-rise u6\">\n        <span class=\"tech\">Rev. A · ∑|Δ| = cost.</span>\n        <span class=\"tech\">L₁</span>\n      </div>\n\n    </aside>\n\n    <!-- =========================== AREA CANVAS =========================== -->\n    <main class=\"stage\">\n\n      <!-- cornice + crocette di registro -->\n      <div class=\"sheet-frame\" aria-hidden=\"true\">\n        <span class=\"reg tl\"></span><span class=\"reg tr\"></span>\n        <span class=\"reg bl\"></span><span class=\"reg br\"></span>\n      </div>\n\n      <!-- ===== FOGLIO TECNICO (SVG) ·  origine px (520,360), scala 80px/unità ===== -->\n      <svg class=\"sheet\" viewBox=\"0 0 1040 720\" preserveAspectRatio=\"xMidYMid meet\" role=\"img\"\n           aria-label=\"Ellisse taxicab (ottagono) con fuochi F1(-2,-1) e F2(2,1), linee critiche, punto P e percorsi L1 a scala\">\n\n        <defs>\n          <!-- freccia per quote dimensionali -->\n          <marker id=\"arrL\" markerWidth=\"10\" markerHeight=\"10\" refX=\"8\" refY=\"3\" orient=\"auto\" markerUnits=\"userSpaceOnUse\">\n            <path d=\"M8 0 L0 3 L8 6 Z\" fill=\"var(--amber)\"/>\n          </marker>\n          <marker id=\"arrR\" markerWidth=\"10\" markerHeight=\"10\" refX=\"2\" refY=\"3\" orient=\"auto\" markerUnits=\"userSpaceOnUse\">\n            <path d=\"M2 0 L10 3 L2 6 Z\" fill=\"var(--amber)\"/>\n          </marker>\n        </defs>\n\n        <!-- (1) GRIGLIA DI MANHATTAN — costruzione, si disegna leggera -->\n        <g class=\"soft\" style=\"--d:.05s\">\n          <g stroke=\"var(--hair)\" stroke-width=\"1\">\n            <!-- verticali ogni 80px (1 unità), da x mondo -6 a 6 -->\n            <path d=\"M40 0 V720 M120 0 V720 M200 0 V720 M280 0 V720 M360 0 V720 M440 0 V720 M520 0 V720 M600 0 V720 M680 0 V720 M760 0 V720 M840 0 V720 M920 0 V720 M1000 0 V720\"/>\n            <!-- orizzontali ogni 80px -->\n            <path d=\"M0 40 H1040 M0 120 H1040 M0 200 H1040 M0 280 H1040 M0 360 H1040 M0 440 H1040 M0 520 H1040 M0 600 H1040 M0 680 H1040\"/>\n          </g>\n        </g>\n\n        <!-- (2) ASSI cartesiani -->\n        <g class=\"soft\" style=\"--d:.18s\">\n          <line x1=\"20\" y1=\"360\" x2=\"1020\" y2=\"360\" stroke=\"var(--sepia-dim)\" stroke-width=\"1.2\"/>\n          <line x1=\"520\" y1=\"20\" x2=\"520\" y2=\"700\" stroke=\"var(--sepia-dim)\" stroke-width=\"1.2\"/>\n          <!-- frecce assi -->\n          <path d=\"M1020 360 l-9 -3.5 v7 z\" fill=\"var(--sepia-dim)\"/>\n          <path d=\"M520 20 l-3.5 9 h7 z\" fill=\"var(--sepia-dim)\"/>\n          <text x=\"1008\" y=\"382\" font-family=\"IBM Plex Mono\" font-size=\"13\" fill=\"var(--sepia)\">x</text>\n          <text x=\"498\" y=\"34\"  font-family=\"IBM Plex Mono\" font-size=\"13\" fill=\"var(--sepia)\">y</text>\n          <!-- numeri assi (mono, deboli) -->\n          <g font-family=\"IBM Plex Mono\" font-size=\"11\" fill=\"var(--sepia-dim)\" text-anchor=\"middle\">\n            <text x=\"360\" y=\"378\">−2</text><text x=\"440\" y=\"378\">−1</text>\n            <text x=\"600\" y=\"378\">1</text><text x=\"680\" y=\"378\">2</text><text x=\"760\" y=\"378\">3</text>\n          </g>\n          <g font-family=\"IBM Plex Mono\" font-size=\"11\" fill=\"var(--sepia-dim)\" text-anchor=\"end\">\n            <text x=\"512\" y=\"284\">1</text><text x=\"512\" y=\"204\">2</text>\n            <text x=\"512\" y=\"444\">−1</text><text x=\"512\" y=\"524\">−2</text>\n          </g>\n        </g>\n\n        <!-- (3) LINEE CRITICHE — x=-2, x=2, y=-1, y=1 (tratteggio sottile) -->\n        <g class=\"soft\" style=\"--d:.30s\" stroke=\"var(--sepia)\" stroke-width=\"1\" stroke-dasharray=\"4 5\" opacity=\"0.7\">\n          <line x1=\"360\" y1=\"40\" x2=\"360\" y2=\"680\"/>   <!-- x=-2 -->\n          <line x1=\"680\" y1=\"40\" x2=\"680\" y2=\"680\"/>   <!-- x=2  -->\n          <line x1=\"80\"  y1=\"440\" x2=\"1000\" y2=\"440\"/> <!-- y=-1 llnode{ fill:var(--amber-soft); stroke:none; }\n  .tool:hover{\n    background:linear-gradient(90deg, rgba(255,176,0,.07), transparent);\n    color:var(--amber); border-left-color:var(--amber);\n  }\n  .tool:hover .ico *{ stroke:var(--amber); filter:drop-shadow(0 0 3px rgba(255,176,0,.6)); }\n  .tool:hover .ico .fillnode{ fill:var(--amber); stroke:none; }\n\n  /* --- object card --- */\n  .obj-card{\n    border:1px solid var(--amber-ghost);\n    background:linear-gradient(180deg, rgba(255,176,0,.04), transparent 50%), var(--panel-2);\n    box-shadow:var(--glow), inset 0 0 30px rgba(0,0,0,.4);\n  }\n  .obj-top{\n    display:flex; align-items:center; gap:10px;\n    padding:11px 12px; border-bottom:1px solid var(--line);\n    cursor:pointer;\n  }\n  .obj-top .swatch{ width:11px; height:11px; flex:none; background:var(--amber); box-shadow:var(--glow); transform:rotate(45deg); }\n  .obj-top .name{ font-size:12px; letter-spacing:.12em; color:var(--amber); text-shadow:var(--glow); text-transform:uppercase; }\n  .obj-top .chev{ margin-left:auto; width:12px; height:12px; }\n  .obj-top .chev *{ stroke:var(--amber-soft); fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }\n\n  .obj-body{ padding:13px 13px 14px; display:flex; flex-direction:column; gap:13px; }\n\n  .kv{ font-size:11.5px; line-height:1.7; color:var(--amber-soft); }\n  .kv .k{ color:var(--amber-dim); }\n  .kv .v{ color:#E6C98C; }\n  .kv .v sub{ font-size:.7em; }\n\n  .readout{\n    border:1px solid var(--line);\n    border-left:2px solid var(--amber);\n    background:linear-gradient(90deg, rgba(255,176,0,.05), transparent);\n    padding:8px 10px; font-size:11.5px; color:var(--amber);\n    text-shadow:var(--glow); letter-spacing:.04em;\n  }\n  .readout .dim{ color:var(--amber-dim); text-shadow:none; }\n\n  /* slider */\n  .slider-wrap{ display:flex; flex-direction:column; gap:7px; }\n  .slider-lab{\n    display:flex; justify-content:space-between; align-items:baseline;\n    font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--amber-soft);\n  }\n  .slider-lab b{ color:var(--amber); text-shadow:var(--glow); font-weight:600; }\n  .rng{\n    -webkit-appearance:none; appearance:none;\n    width:100%; height:2px; background:var(--amber-ghost);\n    outline:none; cursor:pointer;\n  }\n  .rng::-webkit-slider-thumb{\n    -webkit-appearance:none; appearance:none;\n    width:14px; height:14px; border-radius:50%;\n    background:var(--amber); box-shadow:var(--glow-strong);\n    border:1px solid #100B06;\n  }\n  .rng::-moz-range-thumb{\n    width:14px; height:14px; border-radius:50%; border:1px solid #100B06;\n    background:var(--amber); box-shadow:var(--glow-strong);\n  }\n  .rng::-moz-range-track{ height:2px; background:var(--amber-ghost); }\n\n  /* bracketed link / buttons */\n  .analisi{\n    display:block; text-align:center;\n    border:1px dashed var(--amber-dim);\n    padding:9px 10px; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase;\n    color:var(--amber-soft); cursor:pointer;\n    transition:color .2s var(--ease), border-color .2s var(--ease), box-shadow .2s var(--ease), background .2s var(--ease);\n  }\n  .analisi:hover{ color:var(--amber); border-color:var(--amber); box-shadow:var(--glow); background:rgba(255,176,0,.05); }\n\n  .obj-actions{ display:flex; gap:9px; }\n  .tbtn{\n    flex:1; text-align:center; cursor:pointer;\n    border:1px solid var(--line);\n    padding:8px 6px; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase;\n    color:var(--amber-soft);\n    transition:color .2s var(--ease), border-color .2s var(--ease), box-shadow .2s var(--ease), background .2s var(--ease);\n  }\n  .tbtn::before{ content:\"[ \"; color:var(--amber-dim); }\n  .tbtn::after{ content:\" ]\"; color:var(--amber-dim); }\n  .tbtn:hover{ color:var(--amber); border-color:var(--amber); box-shadow:var(--glow); }\n  .tbtn.danger:hover{ color:#100B06; background:var(--amber); border-color:var(--amber); box-shadow:var(--glow-strong); }\n  .tbtn.danger:hover::before, .tbtn.danger:hover::after{ color:rgba(16,11,6,.6); }\n\n  .prompt-line{\n    margin-top:4px; font-size:11px; color:var(--amber-dim); letter-spacing:.06em;\n    display:flex; align-items:center;\n  }\n  .prompt-line .pfx{ color:var(--amber-soft); margin-right:6px; }\n\n  /* =============== CANVAS / OSCILLOSCOPE =============== */\n  .stage{\n    position:relative;\n    padding:18px;\n    display:flex; flex-direction:column;\n    min-width:0; min-height:0;\n    background:var(--bg-deep);\n  }\n\n  .bezel{\n    position:relative; flex:1; min-height:0;\n    border:1px solid var(--amber-ghost);\n    border-radius:6px;\n    background:\n      radial-gradient(130% 110% at 50% 42%, rgba(255,176,0,.05), transparent 60%),\n      #0C0805;\n    box-shadow:\n      inset 0 0 70px rgba(0,0,0,.7),\n      inset 0 0 0 1px rgba(255,176,0,.05),\n      0 0 0 1px rgba(0,0,0,.5),\n      0 0 40px rgba(255,176,0,.06);\n    overflow:hidden;\n    display:flex; flex-direction:column;\n  }\n  /* bezel corner ticks */\n  .bz-corner{ position:absolute; width:12px; height:12px; border:1px solid var(--amber); box-shadow:var(--glow); opacity:.6; z-index:5; }\n  .bz-corner.tl{ top:6px; left:6px; border-right:0; border-bottom:0; }\n  .bz-corner.tr{ top:6px; right:6px; border-left:0; border-bottom:0; }\n  .bz-corner.bl{ bottom:6px; left:6px; border-right:0; border-top:0; }\n  .bz-corner.br{ bottom:6px; right:6px; border-left:0; border-top:0; }\n\n  /* curvature darkening at extreme edges */\n  .bezel::after{\n    content:\"\"; position:absolute; inset:0; pointer-events:none; z-index:4;\n    background:radial-gradient(120% 120% at 50% 50%, transparent 62%, rgba(0,0,0,.5) 100%);\n  }\n  /* local scanlines inside the screen, finer */\n  .bezel::before{\n    content:\"\"; position:absolute; inset:0; pointer-events:none; z-index:6;\n    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.18) 2px 3px);\n    mix-blend-mode:multiply; opacity:.55;\n  }\n\n  .screen-svg{ position:absolute; inset:0; width:100%; height:100%; display:block; z-index:2; }\n\n  /* equation overlay box */\n  .eq-overlay{\n    position:absolute; left:18px; bottom:46px; z-index:7;\n    max-width:min(58%, 420px);\n    border:1px solid var(--amber-ghost);\n    background:linear-gradient(180deg, rgba(26,18,10,.92), rgba(10,7,4,.92));\n    box-shadow:var(--glow), inset 0 0 24px rgba(0,0,0,.5);\n    padding:11px 14px;\n    backdrop-filter:blur(1px);\n  }\n  .eq-overlay .eq-h{\n    font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--amber-dim);\n    margin-bottom:8px; display:flex; align-items:center; gap:8px;\n  }\n  .eq-overlay .eq-h::before{ content:\"\"; width:5px; height:5px; background:var(--amber); box-shadow:var(--glow); }\n  .eq-line{ font-size:13px; line-height:1.85; color:var(--amber); text-shadow:var(--glow); letter-spacing:.02em; }\n  .eq-line.step{ color:#E6C98C; text-shadow:0 0 8px rgba(255,176,0,.2); }\n  .eq-line .arr{ color:var(--amber-dim); margin:0 8px; text-shadow:none; }\n  .eq-line sub{ font-size:.66em; }\n\n  /* status bar inside stage */\n  .statusbar{\n    position:absolute; left:0; right:0; bottom:0; z-index:8;\n    border-top:1px solid var(--amber-ghost);\n    background:linear-gradient(180deg, rgba(16,11,6,.55), var(--bg-deep));\n    padding:8px 14px;\n    display:flex; align-items:center; gap:14px;\n    font-size:10.5px; letter-spacing:.1em; text-transform:uppercase;\n    color:var(--amber-dim);\n    white-space:nowrap; overflow:hidden;\n  }\n  .statusbar .live{ color:var(--amber); text-shadow:var(--glow); display:inline-flex; align-items:center; gap:7px; }\n  .statusbar .live .pulse{\n    width:7px; height:7px; border-radius:50%; background:var(--amber); box-shadow:var(--glow);\n    animation:pulse 1.6s ease-in-out infinite;\n  }\n  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.25;} }\n  .statusbar .sep{ color:var(--amber-ghost); }\n  .statusbar .v{ color:var(--amber-soft); }\n  .statusbar .gap{ flex:1; }\n  @media(max-width:1180px){ .statusbar .hideS{ display:none; } }\n\n  /* =============== BOOT / POWER-ON =============== */\n  .reveal{ opacity:0; }\n  body.go .reveal{ animation:rise .6s var(--ease) forwards; }\n  @keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }\n\n  body.go .sidebar{ animation:poweron 1s var(--ease) both; }\n  body.go .bezel{ animation:poweron 1.05s var(--ease) .12s both; }\n  @keyframes poweron{\n    0%{ filter:brightness(2.6) blur(2px); opacity:0; transform:scaleY(.004); }\n    16%{ opacity:1; transform:scaleY(.02); }\n    34%{ transform:scaleY(1); filter:brightness(1.5) blur(.5px); }\n    100%{ transform:scaleY(1); filter:none; }\n  }\n\n  /* staggered side reveals after power-on */\n  body.go .s1{ animation-delay:.55s; }\n  body.go .s2{ animation-delay:.66s; }\n  body.go .s3{ animation-delay:.77s; }\n  body.go .s4{ animation-delay:.88s; }\n  body.go .s5{ animation-delay:1.0s; }\n  body.go .s6{ animation-delay:1.12s; }\n\n  /* vector trace draw-in (the CRT beam draws the figure) */\n  .trace-anim{ stroke-dasharray:var(--len,1400); stroke-dashoffset:var(--len,1400); }\n  body.go .trace-anim{ animation:draw 1.5s var(--ease) 1.0s forwards; }\n  @keyframes draw{ to{ stroke-dashoffset:0; } }\n\n  .node-pop{ opacity:0; transform-box:fill-box; transform-origin:center; }\n  body.go .node-pop{ animation:pop .42s var(--ease) forwards; }\n  body.go .node-pop:nth-of-type(1){ animation-delay:2.0s; }\n  body.go .node-pop:nth-of-type(2){ animation-delay:2.12s; }\n  body.go .node-pop:nth-of-type(3){ animation-delay:2.24s; }\n  body.go .node-pop:nth-of-type(4){ animation-delay:2.36s; }\n  @keyframes pop{ from{opacity:0; transform:scale(0);} 70%{opacity:1; transform:scale(1.45);} to{opacity:1; transform:scale(1);} }\n\n  .fade-late{ opacity:0; }\n  body.go .fade-late{ animation:fadeIn .8s var(--ease) 2.1s forwards; }\n  @keyframes fadeIn{ to{ opacity:1; } }\n\n  /* ================= REDUCED MOTION ================= */\n  @media (prefers-reduced-motion: reduce){\n    body::before{ animation:none; }\n    .cur{ animation:none !important; opacity:1 !important; }\n    .statusbar .live .pulse{ animation:none; }\n    .reveal,.s1,.s2,.s3,.s4,.s5,.s6{ opacity:1 !important; }\n    body.go .reveal, body.go .sidebar, body.go .bezel,\n    body.go .trace-anim, body.go .node-pop, body.go .fade-late{ animation:none !important; }\n    .trace-anim{ stroke-dashoffset:0 !important; }\n    .node-pop{ opacity:1 !important; transform:none !important; }\n    .fade-late{ opacity:1 !important; }\n  }\n\n  @media(max-width:720px){\n    .app{ grid-template-columns:1fr; grid-template-rows:auto 1fr; }\n    .sidebar{ max-height:46vh; border-right:0; border-bottom:1px solid var(--line); }\n    .stage{ padding:12px; }\n    .eq-overlay{ max-width:78%; left:12px; bottom:44px; }\n  }\n</style>\n</head>\n<body class=\"go\">\n\n  <div class=\"grain\" aria-hidden=\"true\"></div>\n\n  <div class=\"app\">\n\n    <!-- ===================== SIDEBAR ===================== -->\n    <aside class=\"sidebar\">\n      <div class=\"side-pad\">\n\n        <!-- HEADER -->\n        <div class=\"calc-head reveal s1\">\n          <div>\n            <div class=\"ttl\">Calcolatore<br>Grafico</div>\n            <div class=\"sub\">Geometria del Taxi · L<sub>1</sub></div>\n          </div>\n          <button class=\"esc-btn\" type=\"button\" aria-label=\"Chiudi (ESC)\">\n            <svg viewBox=\"0 0 16 16\" aria-hidden=\"true\">\n              <line x1=\"3\" y1=\"3\" x2=\"13\" y2=\"13\"/>\n              <line x1=\"13\" y1=\"3\" x2=\"3\" y2=\"13\"/>\n            </svg>\n            ESC\n          </button>\n        </div>\n\n        <!-- TOOLBAR -->\n        <div class=\"toolbar reveal s1\">\n          <span class=\"snap\">\n            <span class=\"toggle\" role=\"switch\" aria-checked=\"true\"><i></i></span>\n            Snap\n          </span>\n          <span class=\"div\"></span>\n          <span class=\"svuota\" role=\"button\">\n            <svg viewBox=\"0 0 16 16\" aria-hidden=\"true\">\n              <path d=\"M3 4 h10\"/>\n              <path d=\"M6 4 v-1.5 h4 v1.5\"/>\n              <path d=\"M4.5 4 l.8 9 h5.4 l.8 -9\"/>\n            </svg>\n            Svuota\n          </span>\n        </div>\n\n        <!-- CREA OGGETTO -->\n        <div class=\"sec-h reveal s2\">CREA <b>OGGETTO</b><span class=\"ln\"></span></div>\n        <div class=\"tools reveal s2\">\n\n          <!-- Asse: bisettrice (perpendicular tick on a segment) -->\n          <div class=\"tool\">\n            <svg class=\"ico\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n              <line x1=\"3\" y1=\"17\" x2=\"21\" y2=\"7\"/>\n              <circle class=\"fillnode\" cx=\"5\" cy=\"16\" r=\"1.7\"/>\n              <circle class=\"fillnode\" cx=\"19\" cy=\"8\" r=\"1.7\"/>\n              <line x1=\"12\" y1=\"3\" x2=\"12\" y2=\"21\"/>\n            </svg>\n            Asse\n          </div>\n\n          <!-- Circonferenza: taxicab rhombus -->\n          <div class=\"tool\">\n            <svg class=\"ico\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n              <path d=\"M12 3 L21 12 L12 21 L3 12 Z\"/>\n              <circle class=\"fillnode\" cx=\"12\" cy=\"12\" r=\"1.4\"/>\n            </svg>\n            Circonferenza\n          </div>\n\n          <!-- Ellisse: octagon -->\n          <div class=\"tool\">\n            <svg class=\"ico\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n              <path d=\"M8 3 H16 L21 8 V16 L16 21 H8 L3 16 V8 Z\"/>\n            </svg>\n            Ellisse\n          </div>\n\n          <!-- Iperbole: two arcs -->\n          <div class=\"tool\">\n            <svg class=\"ico\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">\n              <path d=\"M9 3 C5 8, 5 16, 9 21\"/>\n              <path d=\"M15 3 C19 8, 19 16, 15 21\"/>\n            </svg>\n            Iperbole\n          </div>\n\n          <!-- Parabola: open curve -->\n          <div class=\"tool\ pan class=\"k\">F<sub>1</sub></span> <span class=\"v\">(−2, −1)</span>\n              &nbsp;·&nbsp;\n              <span class=\"k\">F<sub>2</sub></span> <span class=\"v\">(2, 1)</span>\n            </div>\n\n            <div class=\"slider-wrap\">\n              <div class=\"slider-lab\">\n                <span>Somma <span style=\"color:var(--amber-dim)\">2a</span></span>\n                <b>S = 8</b>\n              </div>\n              <input class=\"rng\" type=\"range\" min=\"6\" max=\"14\" value=\"8\" step=\"1\" aria-label=\"Somma 2a\" />\n            </div>\n\n            <div class=\"readout\">\n              d<sub>0</sub> = 6.00 <span class=\"dim\">·</span> k = 1.00\n            </div>\n\n            <div class=\"analisi\">[ ANALISI REGIONI E EQUAZIONI ]</div>\n\n            <div class=\"obj-actions\">\n              <span class=\"tbtn\">ISOLA</span>\n              <span class=\"tbtn danger\">ELIMINA</span>\n            </div>\n\n            <div class=\"prompt-line\">\n              <span class=\"pfx\">L1&gt;</span> in attesa input<span class=\"cur\" style=\"height:.92em\"></span>\n            </div>\n\n          </div>\n        </div>\n\n      </div>\n    </aside>\n\n    <!-- ===================== STAGE / OSCILLOSCOPE ===================== -->\n    <main class=\"stage\">\n      <div class=\"bezel\">\n        <span class=\"bz-corner tl\"></span><span class=\"bz-corner tr\"></span>\n        <span class=\"bz-corner bl\"></span><span class=\"bz-corner br\"></span>\n\n        <!-- WORLD->PIXEL: viewBox 900x620, center (450,310), scale 58 px/unit -->\n        <svg class=\"screen-svg\" viewBox=\"0 0 900 620\" preserveAspectRatio=\"xMidYMid slice\" aria-label=\"Display vettoriale: ellisse taxicab (ottagono) con fuochi F1 e F2, rette critiche e percorsi a scaletta dal punto P.\">\n          <defs>\n            <filter id=\"bloom\" x=\"-30%\" y=\"-30%\" width=\"160%\" height=\"160%\">\n              <feGaussianBlur stdDeviation=\"2.6\" result=\"b\"/>\n window.__BOZZE["c5"]="<!DOCTYPE html>\n<html lang=\"it\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Calcolatore Grafico — Geometria del Taxi · Organico caldo</title>\n<meta name=\"description\" content=\"Calcolatore grafico della geometria del taxi (metrica L₁) — mockup estetico, direzione organica calda.\">\n\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&display=swap\" rel=\"stylesheet\">\n\n<style>\n  /* ============================================================\n     CALCOLATORE GRAFICO · direzione \"organico caldo\"\n     carta osso/avena, espresso, terracotta — hairline & aria\n     ============================================================ */\n\n  :root{\n    --osso:        #EAE3D5;   /* dominante: carta osso/avena */\n    --osso-chiaro: #F2ECE0;   /* incavo luminoso */\n    --osso-velo:   #E1D8C7;   /* griglie tenui, hairline */\n    --espresso:    #221A11;   /* testo / inchiostro */\n    --terracotta:  #C75B39;   /* UNICO accento, parsimonioso */\n    --terra-velo:  #C75B3922; /* alone terracotta */\n    --terra-fill:  #C75B390E; /* riempimento finissimo */\n    --neutro:      #8C8270;   /* label, secondario */\n    --neutro-velo: #8C827033;\n\n    --linea:       #221A1120; /* hairline su carta */\n    --linea-forte: #221A1138;\n\n    --serif: \"Fraunces\", Georgia, serif;\n    --display: \"Syne\", sans-serif;\n\n    --sidebar: 312px;\n  }\n\n  *{ box-sizing:border-box; }\n  html,body{ height:100%; }\n\n  body{\n    margin:0;\n    background:var(--osso);\n    color:var(--espresso);\n    font-family:var(--serif);\n    font-weight:400;\n    font-optical-sizing:auto;\n    line-height:1.5;\n    /* grana di carta finissima generata in CSS — niente immagini esterne */\n    background-image:\n      radial-gradient(var(--osso-chiaro) 0.6px, transparent 0.7px),\n      radial-gradient(var(--osso-velo)  0.6px, transparent 0.7px);\n    background-size: 7px 7px, 11px 11px;\n    background-position: 0 0, 3px 4px;\n    -webkit-font-smoothing:antialiased;\n    text-rendering:optimizeLegibility;\n    overflow:hidden;\n  }\n\n  ::selection{ background:var(--terracotta); color:var(--osso-chiaro); }\n\n  /* numeri in stile tabellare, su carta */\n  .num,.tab{ font-variant-numeric: tabular-nums lining-nums; }\n\n  /* micro-iconografia: tratti non-scaling */\n  .glyph{ display:inline-block; vertical-align:middle; overflow:visible; flex:0 0 auto; }\n  .glyph path, .glyph line, .glyph circle, .glyph polyline, .glyph rect, .glyph polygon{\n    vector-effect:non-scaling-stroke;\n  }\n\n  /* label angolari minuscole, lettera di stampa */\n  .tag{\n    font-family:var(--display);\n    font-weight:600;\n    font-size:11px;\n    letter-spacing:0.2em;\n    text-transform:uppercase;\n    color:var(--neutro);\n  }\n  .tag-terra{ color:var(--terracotta); }\n\n  /* hairline ricorrente — separatore, mai card */\n  .rule{ height:1px; background:var(--linea); border:0; margin:0; }\n\n  /* ============================================================\n     IMPALCATURA — due colonne, separate da una hairline\n     ============================================================ */\n  .app{\n    display:grid;\n    grid-template-columns: var(--sidebar) 1fr;\n    height:100vh;\n    height:100dvh;\n  }\n\n  /* -------------------- SIDEBAR -------------------- */\n  .side{\n    position:relative;\n    display:flex;\n    flex-direction:column;\n    min-height:0;\n    padding: 26px 26px 0 clamp(20px, 2.2vw, 32px);\n    /* la separazione è una sola hairline verticale, niente pannello pesante */\n    border-right:1px solid var(--linea);\n    overflow-y:auto;\n    overflow-x:hidden;\n  }\n  /* scrollbar discreta */\n  .side::-webkit-scrollbar{ width:10px; }\n  .side::-webkit-scrollbar-thumb{ background:var(--neutro-velo); border-radius:99px; border:3px solid transparent; background-clip:padding-box; }\n\n  /* header sidebar */\n  .s-head{\n    display:flex; align-items:flex-start; justify-content:space-between;\n    gap:14px; padding-bottom:18px;\n  }\n  .s-title{\n    font-family:var(--display); font-weight:700;\n    font-size:18px; letter-spacing:0.005em; line-height:1.05;\n    margin:0;\n  }\n  .s-title .mk{ color:var(--terracotta); }\n  .s-sub{ margin-top:7px; }\n  /* chiusura ESC — croce come glifo a tratto, non emoji */\n  .esc{\n    display:inline-flex; align-items:center; gap:7px;\n    color:var(--neutro);\n    font-family:var(--display); font-weight:600; font-size:10.5px;\n    letter-spacing:0.16em; text-transform:uppercase;\n    padding:5px 8px; border:1px solid var(--linea-forte); border-radius:2px;\n    background:transparent; cursor:pointer;\n    transition:color .25s ease, border-color .25s ease, transform .25s ease;\n  }\n  .esc:hover{ color:var(--espresso); border-color:var(--espresso); transform:translateY(-1px); }\n  .esc .glyph{ color:currentColor; }\n\n  /* toolbar: snap + svuota */\n  .s-toolbar{\n    display:flex; align-items:center; justify-content:space-between;\n    gap:12px; padding:14px 0;\n  }\n  .toolbtn{\n    display:inline-flex; align-items:center; gap:9px;\n    font-family:var(--display); font-weight:600; font-size:12px;\n    letter-spacing:0.02em; color:var(--espresso);\n    background:transparent; border:0; cursor:pointer; padding:2px 0;\n    transition:color .22s ease;\n  }\n  .toolbtn:hover{ color:var(--terracotta); }\n  .toolbtn .glyph{ color:var(--neutro); transition:color .22s ease; }\n  .toolbtn:hover .glyph{ color:var(--terracotta); }\n  /* toggle snap disegnato a geometria, ON */\n  .switch{ position:relative; width:34px; height:18px; flex:0 0 auto; }\n  .switch svg{ display:block; overflow:visible; }\n\n  /* heading di sezione nel sidebar */\n  .s-section{\n    display:flex; align-items:baseline; justify-content:space-between;\n    gap:10px; padding:18px 0 4px;\n  }\n  .s-section .tag{ letter-spacing:0.22em; }\n\n  /* lista strumenti — hairline tra le voci */\n  .tools{ display:flex; flex-direction:column; }\n  .tool{\n    display:flex; align-items:center; gap:13px;\n    padding:11px 4px 11px 0;\n    border-top:1px solid var(--linea);\n    cursor:pointer; position:relative;\n    transition:padding-left .25s ease;\n  }\n  .tools .tool:first-child{ border-top:0; }\n  .tool .mk{ width:22px; height:22px; flex:0 0 auto; color:var(--neutro); }\n  .tool .lab{\n    font-family:var(--serif); font-size:16px; font-weight:400; line-height:1.1;\n    color:var(--espresso);\n  }\n  .tool .hint{\n    margin-left:auto; font-family:var(--display); font-weight:600;\n    font-size:9.5px; letter-spacing:0.14em; text-transform:uppercase;\n    color:var(--neutro); opacity:0; transition:opacity .25s ease;\n  }\n  .tool::before{\n    content:\"\"; position:absolute; left:-26px; top:50%; width:0; height:1px;\n    background:var(--terracotta); transition:width .28s ease; transform:translateY(-50%);\n  }\n  .tool:hover{ padding-left:8px; }\n  .tool:hover .mk{ color:var(--terracotta); }\n  .tool:hover .lab{ color:var(--terracotta); }\n  .tool:hover .hint{ opacity:1; }\n  .tool:hover::before{ width:18px; }\n\n  /* ----- oggetto: ellisse #1, accordion aperto, delineato da hairline ----- */\n  .objs{ display:flex; flex-direction:column; padding-bottom:32px; }\n  .obj{ border-top:1px solid var(--linea); padding-top:2px; }\n  .obj-head{\n    display:flex; align-items:center; gap:11px;\n    padding:13px 2px;\n    cursor:pointer;\n  }\n  .obj-head .mk{ width:20px; height:20px; color:var(--terracotta); }\n  .obj-head .name{\n    font-family:var(--display); font-weight:600; font-size:14px; letter-spacing:0.01em;\n  }\n  .obj-head .chev{ margin-left:auto; color:var(--neutro); transition:transform .3s ease; }\n  .obj.open .obj-head .chev{ transform:rotate(180deg); }\n\n  .obj-body{ padding:0 2px 18px; display:flex; flex-direction:column; gap:16px; }\n\n  .readout{\n    display:flex; flex-direction:column; gap:7px;\n    font-size:14.5px; color:#3a2f22;\n  }\n  .readout .row{ display:flex; align-items:center; gap:8px; }\n  .readout .k{ color:var(--neutro); font-family:var(--display); font-weight:600;\n    font-size:10.5px; letter-spacing:0.12em; text-transform:uppercase; min-width:24px; }\n  .readout .v{ font-variant-numeric:tabular-nums lining-nums; }\n  .readout .sub{ font-size:0.7em; vertical-align:-0.16em; color:var(--neutro); }\n\n  /* slider soffice disegnato su carta */\n  .ctrl{ display:flex; flex-direction:column; gap:9px; }\n  .ctrl-top{ display:flex; align-items:baseline; justify-content:space-between; }\n  .ctrl-top .lab{ font-family:var(--display); font-weight:600; font-size:11px;\n    letter-spacing:0.14em; text-transform:uppercase; color:var(--neutro); }\n  .ctrl-top .val{ font-variant-numeric:tabular-nums; font-size:15px; color:var(--espresso); }\n  .ctrl-top .val b{ color:var(--terracotta); font-weight:500; }\n  .slider{ position:relative; height:14px; }\n  .slider .track{ position:absolute; left:0; right:0; top:50%; height:1px; background:var(--linea-forte); transform:translateY(-50%); }\n  .slider .fill{ position:absolute; left:0; top:50%; height:1.5px; background:var(--terracotta); transform:translateY(-50%); }\n  .slider .thumb{\n    position:absolute; top:50%; width:13px; height:13px;\n    transform:translate(-50%,-50%) rotate(45deg);\n    background:var(--osso); border:1.6px solid var(--terracotta);\n    transition:transform .2s ease, box-shadow .2s ease;\n  }\n  .slider:hover .thumb{ box-shadow:0 0 0 6px var(--terra-velo); }\n  .ctrl-out{\n    font-size:13.5px; color:#3a2f22;\n    font-variant-numeric:tabular-nums lining-nums;\n    padding-top:2px;\n  }\n  .ctrl-out .op{ color:var(--terracotta); padding:0 .3em; }\n\n  /* link analisi regioni */\n  .analisi{\n    display:flex; align-items:center; gap:9px;\n    font-family:var(--display); font-weight:600; font-size:11.5px;\n    letter-spacing:0.06em; color:var(--espresso);\n    background:transparent; border:0; cursor:pointer;\n    padding:11px 0; border-top:1px solid var(--linea); border-bottom:1px solid var(--linea);\n    transition:color .22s ease;\n  }\n  .analisi:hover{ color:var(--terracotta); }\n  .analisi .glyph{ color:var(--terracotta); }\n  .analisi .chev{ margin-left:auto; color:var(--neutro); }\n\n  /* azioni quiete: isola / elimina */\n  .obj-actions{ display:flex; gap:24px; padding-top:2px; }\n  .qbtn{\n    display:inline-flex; align-items:center; gap:8px;\n    font-family:var(--display); font-weight:600; font-size:11px;\n    letter-spacing:0.1em; text-transform:uppercase;\n    background:transparent; border:0; cursor:pointer; padding:2px 0;\n    color:var(--neutro); position:relative;\n    transition:color .22s ease;\n  }\n  .qbtn::after{ content:\"\"; position:absolute; left:0; right:100%; bottom:-2px; height:1px;\n    background:currentColor; transition:right .28s ease; }\n  .qbtn:hover::after{ right:0; }\n  .qbtn .glyph{ color:currentColor; }\n  .qbtn.q-iso:hover{ color:var(--espresso); }\n  .qbtn.q-del:hover{ color:var(--terracotta); }\n\n  /* firma minuscola in fondo al sidebar */\n  .s-foot{\n    margin-top:auto; padding:16px 0 22px;\n    border-top:1px solid var(--linea);\n    display:flex; align-items:center; gap:9px;\n    color:var(--neutro);\n  }\n  .s-foot .glyph{ color:var(--terracotta); }\n  .s-foot span{ font-family:var(--display); font-weight:600; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; }\n\n  /* -------------------- CANVAS AREA -------------------- */\n  .stage{\n    position:relative;\n    min-width:0;\n    overflow:hidden;\n    background:\n      radial-gradient(120% 120% at 50% 40%, var(--osso-chiaro) 0%, var(--osso) 70%);\n  }\n  .scene{ position:absolute; inset:0; width:100%; height:100%; display:block; }\n\n  /* etichette tucked agli angoli — niente barre pesanti */\n  .corner{\n    position:absolute; z-index:3; pointer-events:none;\n    display:flex; flex-direction:column; gap:4px;\n  }\n  .corner.tl{ top:20px; left:24px; }\n  .corner.tr{ top:20px; right:26px; align-items:flex-end; text-align:right; }\n  .corner .big{ font-family:var(--display); font-weight:700; font-size:13px; letter-spacing:0.04em; color:var(--espresso); }\n  .corner .small{ font-family:var(--display); font-weight:600; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--neutro); }\n\n  /* riquadro equazione — delineato da hairline, mai card pesante */\n  .eqbox{\n    position:absolute; z-index:3; left:24px; bottom:60px;\n    pointer-events:none;\n    padding:14px 0 14px;\n    border-top:1px solid var(--linea-forte);\n    border-bottom:1px solid var(--linea-forte);\n    max-width:min(48%, 420px);\n    background:linear-gradient(var(--osso-chiaro), var(--osso-chiaro)) padding-box;\n  }\n  .eqbox .cap{ display:block; margin-bottom:9px; }\n  .eqbox .eq{\n    font-family:var(--serif); font-size:clamp(14px,1.3vw,17px); line-height:1.95;\n    letter-spacing:0.01em; white-space:nowrap;\n  }\n  .eqbox .eq .sub{ font-size:0.66em; vertical-align:-0.16em; color:var(--neutro); }\n  .eqbox .eq .op{ color:var(--terracotta); padding:0 0.1em; }\n  .eqbox .eq .to{ color:var(--neutro); padding:0 0.55em; }\n  .eqbox .eq .lead{ display:inline-block; width:0.9em; }\n\n  /* unit-rhombus leitmotif — legenda tucked basso-destra */\n  .legend{\n    position:absolute; z-index:3; right:26px; bottom:60px;\n    pointer-events:none; text-align:right;\n    display:flex; align-items:center; gap:11px; flex-direction:row-reverse;\n  }\n  .legend .glyph{ color:var(--terracotta); }\n  .legend .lt{ font-family:var(--display); font-weight:600; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--neutro); line-height:1.5; }\n  .legend .lt b{ color:var(--espresso); font-weight:600; }\n\n  /* status line — sottile e ariosa */\n  .status{\n    position:absolute; z-index:3; left:0; right:0; bottom:0;\n    display:flex; align-items:center; gap:6px; flex-wrap:wrap;\n    padding:12px 24px;\n    border-top:1px solid var(--linea);\n    background:linear-gradient(to top, var(--osso-chiaro), transparent);\n    font-family:var(--display); font-weight:600; font-size:11px; letter-spacing:0.04em;\n    color:var(--neutro);\n  }\n  .status .v{ font-variant-numeric:tabular-nums lining-nums; color:#3a2f22; }\n  .status .sep{ color:var(--terracotta); padding:0 4px; }\n  .status .on{ color:var(--terracotta); }\n\n  /* ============================================================\n     ANIMAZIONE D'INGRESSO — un solo reveal, soffice, scaglionato\n     ============================================================ */\n  .reveal{\n    opacity:0; transform:translateY(12px);\n    animation: rise .85s cubic-bezier(.2,.6,.15,1) forwards;\n    animation-delay: var(--d, 0ms);\n  }\n  @keyframes rise{ to{ opacity:1; transform:none; } }\n\n  .draw{ stroke-dasharray: var(--len, 800); stroke-dashoffset: var(--len, 800);\n    animation: trace 1.5s cubic-bezier(.45,.05,.2,1) forwards; animation-delay: var(--d, 300ms); }\n  @keyframes trace{ to{ stroke-dashoffset:0; } }\n\n  .pop{ opacity:0; transform:scale(.4); transform-origin:center;\n    animation: bloom .6s cubic-bezier(.2,1.4,.3,1) forwards; animation-delay: var(--d, 800ms); }\n  @keyframes bloom{ to{ opacity:1; transform:scale(1); } }\n\n  @media (prefers-reduced-motion: reduce){\n    .reveal, .draw, .pop{\n      animation:none !important;\n      opacity:1 !important; transform:none !important;\n      stroke-dashoffset:0 !important;\n    }\n  }\n\n  /* ============================================================\n     RIDUZIONE — sotto i 880px lo stage va in alto, sidebar sotto\n     ============================================================ */\n  @media (max-width:880px){\n    body{ overflow:auto; }\n    .app{ grid-template-columns:1fr; height:auto; min-height:100dvh; }\n    .stage{ height:62vh; min-height:420px; order:-1; border-bottom:1px solid var(--linea); }\n    .side{ border-right:0; }\n    .eqbox{ max-width:62%; }\n  }\n</style>\n</head>\n<body>\n\n<div class=\"app\">\n\n  <!-- ============================ SIDEBAR ============================ -->\n  <aside class=\"side\" aria-label=\"Pannello del calcolatore\">\n\n    <!-- 1. header -->\n    <div class=\"s-head reveal\" style=\"--d:60ms\">\n      <div>\n        <h1 class=\"s-title\"><span class=\"mk\">◇</span> Calcolatore Grafico</h1>\n        <span class=\"tag s-sub\">Geometria del Taxi · L₁</span>\n      </div>\n      <button class=\"esc\" type=\"button\" aria-label=\"Chiudi il calcolatore\">\n        <span>Esc</span>\n        <svg class=\"glyph\" width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\" aria-hidden=\"true\">\n          <path d=\"M2 2 L10 10 M10 2 L2 10\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\"/>\n        </svg>\n      </button>\n    </div>\n\n    <hr class=\"rule reveal\" style=\"--d:90ms\">\n\n    <!-- 2. toolbar -->\n    <div class=\"s-toolbar reveal\" style=\"--d:130ms\">\n      <button class=\"toolbtn\" type=\"button\" aria-pressed=\"true\">\n        <span class=\"switch\" aria-hidden=\"true\">\n          <svg width=\"34\" height=\"18\" viewBox=\"0 0 34 18\" fill=\"none\">\n            <!-- binario -->\n            <rect x=\"1\" y=\"4.5\" width=\"32\" height=\"9\" rx=\"4.5\" stroke=\"var(--terracotta)\" stroke-width=\"1.3\" fill=\"var(--terra-velo)\"/>\n            <!-- pomello a rombo, posizione ON (destra) -->\n            <path d=\"M25 3 L31 9 L25 15 L19 9 Z\" fill=\"var(--terracotta)\"/>\n          </svg>\n        </span>\n        Snap <span class=\"tag tag-terra\" style=\"letter-spacing:.14em\">on</span>\n      </button>\n      <button class=\"toolbtn\" type=\"button\">\n        <svg class=\"glyph\" width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\">\n          <path d=\"M3 4.5 H13 M5 4.5 V13 a1 1 0 0 0 1 1 H10 a1 1 0 0 0 1 -1 V4.5 M6.5 4.5 V3 a1 1 0 0 1 1 -1 H8.5 a1 1 0 0 1 1 1 V4.5\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n        </svg>\n        Svuota\n      </button>\n    </div>\n\n    <!-- 3. crea oggetto -->\n    <div class=\"s-section reveal\" style=\"--d:180ms\">\n      <span class=\"tag\">Crea oggetto</span>\n      <span class=\"tag tag-terra\">7</span>\n    </div>\n\n    <div class=\"tools reveal\" style=\"--d:220ms\">\n      <!-- Asse -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <svg class=\"mk\" viewBox=\"0 0 22 22\" fill=\"none\" aria-hidden=\"true\">\n          <line x1=\"3\" y1=\"16\" x2=\"19\" y2=\"6\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\"/>\n          <circle cx=\"5\" cy=\"14.8\" r=\"1.5\" fill=\"currentColor\"/>\n          <circle cx=\"17\" cy=\"7.2\" r=\"1.5\" fill=\"currentColor\"/>\n        </svg>\n        <span class=\"lab\">Asse</span>\n        <span class=\"hint\">retta</span>\n      </div>\n      <!-- Circonferenza (rombo taxicab) -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <svg class=\"mk\" viewBox=\"0 0 22 22\" fill=\"none\" aria-hidden=\"true\">\n          <path d=\"M11 3 L19 11 L11 19 L3 11 Z\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linejoin=\"round\"/>\n          <circle cx=\"11\" cy=\"11\" r=\"1.3\" fill=\"currentColor\"/>\n        </svg>\n        <span class=\"lab\">Circonferenza</span>\n        <span class=\"hint\">rombo</span>\n      </div>\n      <!-- Ellisse (ottagono) -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <svg class=\"mk\" viewBox=\"0 0 22 22\" fill=\"none\" aria-hidden=\"true\">\n          <path d=\"M7 3 H15 L19 7 V15 L15 19 H7 L3 15 V7 Z\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linejoin=\"round\"/>\n        </svg>\n        <span class=\"lab\">Ellisse</span>\n        <span class=\"hint\">ottagono</span>\n      </div>\n      <!-- Iperbole (due archi) -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <svg class=\"mk\" viewBox=\"0 0 22 22\" fill=\"none\" aria-hidden=\"true\">\n          <path d=\"M9 3 L4 11 L9 19\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n          <path d=\"M13 3 L18 11 L13 19\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n        </svg>\n        <span class=\"lab\">Iperbole</span>\n        <span class=\"hint\">2 rami</span>\n      </div>\n      <!-- Parabola (curva aperta) -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <svg class=\"mk\" viewBox=\"0 0 22 22\" fill=\"none\" aria-hidden=\"true\">\n          <path d=\"M4 4 L9 11 L11 11 L13 11 L18 18\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n        </svg>\n        <span class=\"lab\">Parabola</span>\n        <span class=\"hint\">aperta</span>\n      </div>\n      <!-- Luogo (punti puntinati) -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <svg class=\"mk\" viewBox=\"0 0 22 22\" fill=\"none\" aria-hidden=\"true\">\n          <g fill=\"currentColor\">\n            <circle cx=\"4\" cy=\"15\" r=\"1.2\"/><circle cx=\"8\" cy=\"11\" r=\"1.2\"/>\n            <circle cx=\"12\" cy=\"8\" r=\"1.2\"/><circle cx=\"16\" cy=\"7\" r=\"1.2\"/>\n            <circle cx=\"19\" cy=\"9\" r=\"1.2\"/><circle cx=\"10\" cy=\"16\" r=\"1.2\"/>\n            <circle cx=\"15\" cy=\"14\" r=\"1.2\"/>\n          </g>\n        </svg>\n        <span class=\"lab\">Luogo</span>\n        <span class=\"hint\">punti</span>\n      </div>\n      <!-- Distanza (segmento con tacche) -->\n      <div class=\"tool\" role=\"button\" tabindex=\"0\">\n        <svg class=\"mk\" viewBox=\"0 0 22 22\" fill=\"none\" aria-hidden=\"true\">\n          <line x1=\"4\" y1=\"11\" x2=\"18\" y2=\"11\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\"/>\n          <line x1=\"4\" y1=\"7\" x2=\"4\" y2=\"15\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\"/>\n          <line x1=\"18\" y1=\"7\" x2=\"18\" y2=\"15\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\"/>\n        </svg>\n        <span class=\"lab\">Distanza</span>\n        <span class=\"hint\">segmento</span>\n      </div>\n    </div>\n\n    <!-- 4. oggetti -->\n    <div class=\"s-section reveal\" style=\"--d:300ms\">\n      <span class=\"tag\">Oggetti (1)</span>\n      <span class=\"tag tag-terra\">◇</span>\n    </div>\n\n    <div class=\"objs reveal\" style=\"--d:340ms\">\n      <div class=\"obj open\">\n        <div class=\"obj-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\">\n          <svg class=\"mk\" viewBox=\"0 0 20 20\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M6 2 H14 L18 6 V14 L14 18 H6 L2 14 V6 Z\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linejoin=\"round\"/>\n          </svg>\n          <span class=\"name\">Ellisse #1</span>\n          <svg class=\"chev glyph\" width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M3 5 L7 9 L11 5\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n          </svg>\n        </div>\n\n        <div class=\"obj-body\">\n          <!-- foci -->\n          <div class=\"readout\">\n            <div class=\"row\">\n              <span class=\"k\">F<span class=\"sub\">1</span></span>\n              <span class=\"v\">( −2 , −1 )</span>\n            </div>\n            <div class=\"row\">\n              <span class=\"k\">F<span class=\"sub\">2</span></span>\n              <span class=\"v\">(  2 ,  1 )</span>\n            </div>\n          </div>\n\n          <!-- slider S = 8 -->\n          <div class=\"ctrl\">\n            <div class=\"ctrl-top\">\n              <span class=\"lab\">Somma S</span>\n              <span class=\"val\">S = <b>8</b></span>\n            </div>\n            <div class=\"slider\" role=\"slider\" aria-valuemin=\"6\" aria-valuemax=\"14\" aria-valuenow=\"8\" tabindex=\"0\">\n              <span class=\"track\"></span>\n              <span class=\"fill\" style=\"width:32%\"></span>\n              <span class=\"thumb\" style=\"left:32%\"></span>\n            </div>\n            <div class=\"ctrl-out\">d<span class=\"sub\" style=\"font-size:.7em;vertical-align:-.16em\">0</span> = 6.00 <span class=\"op\">·</span> k = 1.00</div>\n          </div>\n\n          <!-- analisi regioni -->\n          <button class=\"analisi\" type=\"button\">\n            <svg class=\"glyph\" width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\">\n              <path d=\"M8 1 V15 M1 8 H15\" stroke=\"currentColor\" stroke-width=\"1\" stroke-dasharray=\"2 2\"/>\n              <path d=\"M8 1 L11 4 L8 7 L5 4 Z\" fill=\"currentColor\" stroke=\"none\"/>\n            </svg>\n            Analisi regioni e equazioni\n            <svg class=\"chev glyph\" width=\"13\" height=\"13\" viewBox=\"0 0 13 13\" fill=\"none\" aria-hidden=\"true\">\n              <path d=\"M5 3 L9 6.5 L5 10\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n            </svg>\n          </button>\n\n          <!-- azioni -->\n          <div class=\"obj-actions\">\n            <button class=\"qbtn q-iso\" type=\"button\">\n              <svg class=\"glyph\" width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\">\n                <path d=\"M7 2 L12 7 L7 12 L2 7 Z\" stroke=\"currentColor\" stroke-width=\"1.2\"/>\n                <circle cx=\"7\" cy=\"7\" r=\"1.2\" fill=\"currentColor\"/>\n              </svg>\n              Isola\n            </button>\n            <button class=\"qbtn q-del\" type=\"button\">\n              <svg class=\"glyph\" width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\">\n                <path d=\"M3 4.5 H11 M5 4.5 V11 M9 4.5 V11 M5.5 4.5 V3 H8.5 V4.5\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n              </svg>\n              Elimina\n            </button>\n          </div>\n        </div>\n      </div>\n    </div>\n\n    <!-- firma -->\n    <div class=\"s-foot reveal\" style=\"--d:420ms\">\n      <svg class=\"glyph\" width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\" aria-hidden=\"true\">\n        <path d=\"M6 1 L11 6 L6 11 L1 6 Z\" stroke=\"currentColor\" stroke-width=\"1.2\"/>\n      </svg>\n      <span>Geometria del Taxi</span>\n    </div>\n  </aside>\n\n  <!-- ============================ CANVAS AREA ============================ -->\n  <section class=\"stage\" aria-label=\"Area di disegno\">\n\n    <!-- etichette angolari -->\n    <div class=\"corner tl reveal\" style=\"--d:240ms\">\n      <span class=\"big\">Piano L₁</span>\n      <span class=\"small\">metrica di Manhattan</span>\n    </div>\n    <div class=\"corner tr reveal\" style=\"--d:280ms\">\n      <span class=\"small\">Scala · 1 quadretto = 1</span>\n      <span class=\"small\" style=\"color:var(--terracotta)\">Ellisse taxicab · 2a = 8</span>\n    </div>\n\n    <!-- SCENA SVG — world→pixel: viewBox 720×640, centro (360,320), 64 px/unità -->\n    <svg class=\"scene\" viewBox=\"0 0 720 640\" preserveAspectRatio=\"xMidYMid meet\" aria-hidden=\"true\">\n\n      <!-- griglia di Manhattan, carta a quadretti tenue -->\n      <g stroke=\"var(--osso-velo)\" stroke-width=\"1\">\n        <!-- verticali x=-5..5 -->\n        <line x1=\"40\"  y1=\"0\" x2=\"40\"  y2=\"640\"/>\n        <line x1=\"104\" y1=\"0\" x2=\"104\" y2=\"640\"/>\n        <line x1=\"168\" y1=\"0\" x2=\"168\" y2=\"640\"/>\n        <line x1=\"296\" y1=\"0\" x2=\"296\" y2=\"640\"/>\n        <line x1=\"424\" y1=\"0\" x2=\"424\" y2=\"640\"/>\n        <line x1=\"552\" y1=\"0\" x2=\"552\" y2=\"640\"/>\n        <line x1=\"616\" y1=\"0\" x2=\"616\" y2=\"640\"/>\n        <line x1=\"680\" y1=\"0\" x2=\"680\" y2=\"640\"/>\n        <!-- orizzontali y=-4..4 -->\n        <line x1=\"0\" y1=\"64\"  x2=\"720\" y2=\"64\"/>\n        <line x1=\"0\" y1=\"128\" x2=\"720\" y2=\"128\"/>\n        <line x1=\"0\" y1=\"192\" x2=\"720\" y2=\"192\"/>\n        <line x1=\"0\" y1=\"448\" x2=\"720\" y2=\"448\"/>\n        <line x1=\"0\" y1=\"512\" x2=\"720\" y2=\"512\"/>\n        <line x1=\"0\" y1=\"576\" x2=\"720\" y2=\"576\"/>\n      </g>\n\n      <!-- assi attraverso il centro -->\n      <g stroke=\"var(--linea-forte)\" stroke-width=\"1.3\">\n        <line x1=\"360\" y1=\"0\" x2=\"360\" y2=\"640\"/>\n        <line x1=\"0\" y1=\"320\" x2=\"720\" y2=\"320\"/>\n      </g>\n      <!-- tacche numeri quieti sugli assi -->\n      <g font-family=\"Fraunces, serif\" font-size=\"11\" fill=\"var(--neutro)\" style=\"font-variant-numeric:tabular-nums\">\n        <text x=\"426\" y=\"335\">1</text>\n        <text x=\"554\" y=\"335\">3</text>\n        <text x=\"285\" y=\"335\">−1</text>\n        <text x=\"157\" y=\"335\">−3</text>\n        <text x=\"365\" y=\"260\">1</text>\n        <text x=\"365\" y=\"388\">−1</text>\n        <text x=\"365\" y=\"132\">3</text>\n        <text x=\"365\" y=\"516\">−3</text>\n      </g>\n\n      <!-- 4 linee critiche tratteggiate, tenui: x=-2, x=2, y=-1, y=1 -->\n      <g stroke=\"var(--neutro)\" stroke-width=\"1\" stroke-dasharray=\"3 6\" opacity=\"0.6\"\n         class=\"draw\" style=\"--len:640; --d:520ms\">\n        <line x1=\"232\" y1=\"0\" x2=\"232\" y2=\"640\"/>\n        <line x1=\"488\" y1=\"0\" x2=\"488\" y2=\"640\"/>\n        <line x1=\"0\" y1=\"384\" x2=\"720\" y2=\"384\"/>\n        <line x1=\"0\" y1=\"256\" x2=\"720\" y2=\"256\"/>\n      </g>\n\n      <!-- ottagono ellisse taxicab — riempimento finissimo + tratto terracotta -->\n      <!-- vertici (3,1)(2,2)(-2,2)(-3,1)(-3,-1)(-2,-2)(2,-2)(3,-1) -->\n      <polygon points=\"552,256 488,192 232,192 168,256 168,384 232,448 488,448 552,384\"\n               fill=\"var(--terra-fill)\" stroke=\"none\"/>\n      <polygon points=\"552,256 488,192 232,192 168,256 168,384 232,448 488,448 552,384\"\n               fill=\"none\" stroke=\"var(--terracotta)\" stroke-width=\"2.2\" stroke-linejoin=\"round\"\n               class=\"draw\" style=\"--len:1240; --d:360ms\"/>\n\n      <!-- staircase L₁ da P ai fuochi — passi assiali, accento morbido -->\n      <!-- P->F2 (2,1): (2.5,1.5)->(2,1.5)->(2,1) -->\n      <polyline points=\"520,224 488,224 488,256\" fill=\"none\"\n                stroke=\"var(--terracotta)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\n                opacity=\"0.85\" class=\"draw\" style=\"--len:130; --d:1180ms\"/>\n      <!-- P->F1 (-2,-1): (2.5,1.5)->(2.5,-1)->(-2,-1) -->\n      <polyline points=\"520,224 520,384 232,384\" fill=\"none\"\n                stroke=\"var(--neutro)\" stroke-width=\"1.6\" stroke-dasharray=\"1 5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\n                class=\"draw\" style=\"--len:450; --d:1240ms\"/>\n\n      <!-- fuochi -->\n      <g class=\"pop\" style=\"--d:1020ms\">\n        <circle cx=\"232\" cy=\"384\" r=\"13\" fill=\"var(--terra-velo)\"/>\n        <circle cx=\"232\" cy=\"384\" r=\"3.6\" fill=\"var(--terracotta)\"/>\n        <circle cx=\"488\" cy=\"256\" r=\"13\" fill=\"var(--terra-velo)\"/>\n        <circle cx=\"488\" cy=\"256\" r=\"3.6\" fill=\"var(--terracotta)\"/>\n      </g>\n      <!-- etichette fuochi tucked accanto -->\n      <g font-family=\"Fraunces, serif\" font-style=\"italic\" font-size=\"15\" fill=\"var(--espresso)\"\n         class=\"pop\" style=\"--d:1140ms\">\n        <text x=\"200\" y=\"406\">F₁</text>\n        <text x=\"200\" y=\"421\" font-style=\"normal\" font-size=\"11\" fill=\"var(--neutro)\" style=\"font-variant-numeric:tabular-nums\">(−2,−1)</text>\n        <text x=\"500\" y=\"250\">F₂</text>\n        <text x=\"500\" y=\"265\" font-style=\"normal\" font-size=\"11\" fill=\"var(--neutro)\" style=\"font-variant-numeric:tabular-nums\">(2,1)</text>\n      </g>\n\n      <!-- punto P sul bordo dell'ottagono -->\n      <g class=\"pop\" style=\"--d:1320ms\">\n        <circle cx=\"520\" cy=\"224\" r=\"5.4\" fill=\"var(--osso)\" stroke=\"var(--espresso)\" stroke-width=\"2\"/>\n        <text x=\"528\" y=\"216\" font-family=\"Fraunces, serif\" font-style=\"italic\" font-size=\"15\" fill=\"var(--espresso)\">P</text>\n        <text x=\"528\" y=\"231\" font-family=\"Fraunces, serif\" font-size=\"10.5\" fill=\"var(--neutro)\" style=\"font-variant-numeric:tabular-nums\">(2.5, 1.5)</text>\n      </g>\n\n      <!-- leitmotif: rombo unitario L₁ in basso-sinistra, vicino alla legenda -->\n      <g class=\"pop\" style=\"--d:1420ms\" transform=\"translate(96,560)\">\n        <path d=\"M0 -22 L22 0 L0 22 L-22 0 Z\" fill=\"none\" stroke=\"var(--neutro)\" stroke-width=\"1.3\" stroke-linejoin=\"round\"/>\n        <circle cx=\"0\" cy=\"0\" r=\"2\" fill=\"var(--terracotta)\"/>\n        <line x1=\"0\" y1=\"0\" x2=\"22\" y2=\"0\" stroke=\"var(--terracotta)\" stroke-width=\"1.2\" stroke-dasharray=\"2 3\"/>\n      </g>\n    </svg>\n\n    <!-- riquadro equazione, hairline -->\n    <div class=\"eqbox reveal\" style=\"--d:1180ms\">\n      <span class=\"tag tag-terra cap\">Equazione · regione di P</span>\n      <div class=\"eq\">\n        |x <span class=\"op\">−</span> x<span class=\"sub\">1</span>| <span class=\"op\">+</span> |y <span class=\"op\">−</span> y<span class=\"sub\">1</span>|\n        <span class=\"op\">+</span>\n        |x <span class=\"op\">−</span> x<span class=\"sub\">2</span>| <span class=\"op\">+</span> |y <span class=\"op\">−</span> y<span class=\"sub\">2</span>|\n        <span class=\"op\">=</span> 2a<br>\n        <span class=\"lead\"></span>2x <span class=\"op\">+</span> 2y <span class=\"op\">=</span> 8\n        <span class=\"to\">→</span>\n        y <span class=\"op\">=</span> −x <span class=\"op\">+</span> 4\n      </div>\n    </div>\n\n    <!-- legenda rombo unitario tucked -->\n    <div class=\"legend reveal\" style=\"--d:1260ms\">\n      <svg class=\"glyph\" width=\"26\" height=\"26\" viewBox=\"0 0 26 26\" fill=\"none\" aria-hidden=\"true\">\n        <path d=\"M13 2 L24 13 L13 24 L2 13 Z\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linejoin=\"round\"/>\n        <circle cx=\"13\" cy=\"13\" r=\"1.4\" fill=\"currentColor\"/>\n      </svg>\n      <span class=\"lt\"><b>Sfera unitaria L₁</b><br>r = 1 · il rombo</span>\n    </div>\n\n    <!-- status line -->\n    <div class=\"status reveal\" style=\"--d:1340ms\">\n      <span>P</span><span class=\"v\">(2.5, 1.5)</span>\n      <span class=\"sep\">·</span>\n      <span>d<sub style=\"font-variant-numeric:tabular-nums\">1</sub></span><span class=\"v\">7.00</span>\n      <span class=\"sep\">·</span>\n      <span>d<sub>2</sub></span><span class=\"v\">1.00</span>\n      <span class=\"sep\">·</span>\n      <span>somma</span><span class=\"v\">8.00</span>\n      <span class=\"sep\">·</span>\n      <span>snap</span><span class=\"on\">on</span>\n      <span style=\"margin-left:auto\"></span>\n      <span class=\"v\">x: −5.6 … 5.6</span>\n      <span class=\"sep\">·</span>\n      <span class=\"v\">y: −5.0 … 5.0</span>\n    </div>\n  </section>\n</div>\n\n<script>\n/* --------------------------------------------------------------\n   misura la lunghezza reale dei path \"draw\" per un tracciamento\n   preciso. Nessun'altra logica: è un mockup statico, una sola\n   animazione d'ingresso governata in CSS.\n   -------------------------------------------------------------- */\n(function(){\n  var reduce = window.matchMedia &&\n               window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n  if (reduce) return;\n  document.querySelectorAll('.draw').forEach(function(el){\n    try{\n      var len = (typeof el.getTotalLength === 'function') ? el.getTotalLength() : null;\n      if (len && isFinite(len)){\n        len = Math.ceil(len);\n        el.style.setProperty('--len', len);\n        el.style.strokeDasharray = len;\n        el.style.strokeDashoffset = len;\n      }\n    }catch(e){ /* gruppi <g> e <polygon> possono non avere getTotalLength */ }\n  });\n})();\n<\/script>\n\n</body>\n</html>\n";
</script>
  <script>
    const PAGES = [["c1","01 · Editoriale"],["c2","02 · Brutalista"],["c3","03 · Tecnico seppia"],["c4","04 · CRT ambra"],["c5","05 · Organico"]];
    const stage = document.getElementById('stage');
    const label = document.getElementById('label');
    const dots = document.getElementById('dots');
    let cur = 0;
    PAGES.forEach((p, i) => {
      const b = document.createElement('button');
      b.type = 'button'; b.textContent = String(i + 1);
      b.setAttribute('aria-label', 'Vai alla ' + p[1]);
      b.addEventListener('click', () => load(i));
      dots.appendChild(b);
    });
    function load(i) {
      cur = (i + PAGES.length) % PAGES.length;
      stage.srcdoc = window.__BOZZE[PAGES[cur][0]];
      label.innerHTML = 'Calcolatore <b>' + PAGES[cur][1] + '</b>';
      [...dots.children].forEach((d, j) => d.classList.toggle('active', j === cur));
      try { location.hash = String(cur + 1); } catch (e) {}
    }
    document.getElementById('prev').addEventListener('click', () => load(cur - 1));
    document.getElementById('next').addEventListener('click', () => load(cur + 1));
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') load(cur - 1);
      else if (e.key === 'ArrowRight') load(cur + 1);
      else if (e.key >= '1' && e.key <= '5') load(+e.key - 1);
    });
    const start = Math.max(0, Math.min(PAGES.length - 1, (parseInt(location.hash.slice(1), 10) || 1) - 1));
    load(start);
  </script>
